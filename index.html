<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ pancake sticker book ✨</title>
    <style>
        /* 亮晶晶动态粉色背景 */
        body { 
            font-family: 'Segoe UI', Candara, 'Bitstream Vera Sans', 'DejaVu Sans', 'Bitstream Vera Sans', 'Trebuchet MS', Verdana, 'Verdana Ref', sans-serif;
            text-align: center; 
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffdef3, #f7bbff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; 
            padding: 10px; 
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 玻璃拟态容器 */
        .container { 
            max-width: 550px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 30px; 
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2); 
        }

        /* 贴纸选择区域 */
        .sticker-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin: 15px 0; 
            background: rgba(255, 192, 203, 0.3); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px dashed #ff85a2;
        }
        
        .sticker-item { 
            width: 100%; 
            aspect-ratio: 1; 
            border: 3px solid transparent; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: all 0.3s; 
            object-fit: contain;
            background: white;
        }
        
        .sticker-item.active { 
            border-color: #ff4d94; 
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff4d94;
        }

        /* 控制区样式 */
        .controls { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 15px; 
            border-radius: 18px; 
            margin: 15px 0; 
        }
        
        .control-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin: 10px 0; 
            font-size: 15px; 
            color: #d63384; 
            font-weight: bold;
        }
        
        #myCanvas { 
            border: 4px solid #fff; 
            border-radius: 20px; 
            max-width: 100%; 
            height: auto; 
            display: block; 
            margin: 15px auto; 
            background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        /* 自定义滑动条 */
        input[type="range"] { 
            width: 60%; 
            accent-color: #ff4d94;
        }
        
        input[type="color"] { 
            width: 40px; height: 40px; 
            border: 2px solid white; 
            border-radius: 50%; 
            overflow: hidden;
            cursor: pointer; 
            -webkit-appearance: none;
        }

        /* 按钮美化 */
        .footer-btns { display: flex; gap: 12px; }
        button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 50px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            transition: 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-undo { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            color: #d63384;
        }
        .btn-save { 
            background: linear-gradient(135deg, #ff4d94 0%, #ff85a2 100%);
            box-shadow: 0 4px 15px rgba(255, 77, 148, 0.3);
        }
        button:active { transform: scale(0.95); }

        input[type="file"] {
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #ff4d94; margin-top: 0;">✨ pancake sticker book✨</h2>
    
    <div style="padding:10px; border-bottom:1px solid rgba(255,192,203,0.3);">
        <input type="file" id="imgInput" accept="image/*">
    </div>

    <div class="sticker-grid" id="stickerGrid"></div>

    <div class="controls">
        <div class="control-row">
            <span>🎨 钻石颜色:</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="color" id="colorPicker" value="#00E5FF">
                <span id="colorHex" style="font-family: monospace; color: #ff4d94;">#00E5FF</span>
            </div>
        </div>
        <div class="control-row">
            <span>📏 钻石大小:</span>
            <input type="range" id="sizeSlider" min="10" max="300" value="70">
            <span id="sizeVal" style="min-width: 30px;">70</span>
        </div>
    </div>

    <canvas id="myCanvas"></canvas>
    
    <div class="footer-btns">
        <button class="btn-undo" onclick="undo()">⬅️ 撤销</button>
        <button class="btn-save" onclick="download()">💖 保存作品</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const stickerGrid = document.getElementById('stickerGrid');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;

    // --- 初始化 6 张贴纸 ---
    for(let i=1; i<=6; i++) {
        const img = new Image();
        img.src = `sticker${i}.png`; 
        stickers.push(img);

        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
        imgEl.onclick = function() {
            curIdx = i - 1;
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
        };
        stickerGrid.appendChild(imgEl);
    }

    // --- 上传背景 ---
    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                const maxW = 1000; // 限制最大宽度防止内存溢出
                let w = mainImg.width;
                let h = mainImg.height;
                if(w > maxW) {
                    h = (maxW / w) * h;
                    w = maxW;
                }
                canvas.width = w;
                canvas.height = h;
                draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 点击交互 ---
    canvas.addEventListener('mousedown', (e) => handleInput(e));
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput(e.touches[0]);
    }, {passive: false});

    function handleInput(e) {
        if(!mainImg.src) {
            alert("请先上传一张背景图哦！✨");
            return;
        }
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        records.push({
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY,
            idx: curIdx,
            color: document.getElementById('colorPicker').value,
            size: parseInt(document.getElementById('sizeSlider').value)
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if(!sImg.complete) return;

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = r.size;
            offCanvas.height = r.size;

            offCtx.drawImage(sImg, 0, 0, r.size, r.size);
            offCtx.globalCompositeOperation = "multiply";
            offCtx.fillStyle = r.color;
            offCtx.fillRect(0, 0, r.size, r.size);
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(sImg, 0, 0, r.size, r.size);
            
            // 绘制钻石，并加上淡淡的发光感
            ctx.shadowBlur = 10;
            ctx.shadowColor = r.color;
            ctx.drawImage(offCanvas, r.x - r.size/2, r.y - r.size/2);
            ctx.shadowBlur = 0; // 重置阴影
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return;
        
        // --- 解决文件名重复：使用时间戳 ---
        const now = new Date();
        const timeStr = now.getFullYear() + "" + (now.getMonth()+1) + "" + now.getDate() + "_" + now.getHours() + "" + now.getMinutes() + "" + now.getSeconds();
        const fileName = `Diamond_Art_${timeStr}.png`;

        const link = document.createElement('a');
        link.download = fileName;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    document.getElementById('sizeSlider').oninput = function() {
        document.getElementById('sizeVal').innerText = this.value;
    };
    document.getElementById('colorPicker').oninput = function() {
        document.getElementById('colorHex').innerText = this.value.toUpperCase();
    };
</script>
</body>
</html>
