<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Sticker Book v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; }
        
        /* 1. 確保居中佈局 */
        body { 
            font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background-color: #ffeef4; 
        }
        
        .title-header { font-size: 26px; color: #fff; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 0px var(--pink-accent); text-align: center; }

        /* 書本容器居中 */
        .book-container { 
            width: 90%; max-width: 420px; background: var(--book-cover); 
            padding: 15px; border-radius: 15px 40px 40px 15px; 
            box-shadow: 0 20px 40px rgba(214, 51, 132, 0.2);
            position: relative; display: flex; flex-direction: column; margin: 0 auto;
        }

        .top-page, .bottom-page { 
            background: var(--page-white); padding: 15px; position: relative; 
            display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box;
        }
        .top-page { border-radius: 12px 25px 0 0; }
        .bottom-page { border-radius: 0 0 25px 12px; min-height: 350px; margin-top: 20px; }

        /* 2. 線圈樣式 */
        .notebook-rings { 
            height: 20px; display: flex; justify-content: space-around; width: 85%;
            z-index: 20; position: absolute; left: 7.5%; top: calc(50% - 10px); pointer-events: none;
        }
        .ring { width: 10px; height: 40px; background: var(--ring-gray); border-radius: 5px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3); }

        /* 4. 貼紙點擊特效 */
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .sticker-item { 
            width: 100%; aspect-ratio: 1; border-radius: 10px; border: 2px solid #f0f0f0; background: #fff; padding: 5px; box-sizing: border-box; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); object-fit: contain;
        }
        .sticker-item:active { transform: rotate(15deg) scale(1.1); box-shadow: 0 0 15px var(--pink-accent); border-color: var(--pink-accent); }
        .sticker-item.active { border-color: var(--pink-accent); background: #fffafb; }

        /* 控制區域 */
        .text-to-sticker-area { width: 100%; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; margin-bottom: 10px; box-sizing: border-box; }
        .text-input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .text-input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; outline: none; }
        .text-input-group button { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 12px; font-weight: bold; }

        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; margin-top: 5px; }
        input[type=range] { accent-color: var(--pink-accent); width: 100%; cursor: pointer; }

        .controls { display: flex; align-items: center; gap: 15px; width: 100%; }
        .current-color-dot { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; flex-shrink: 0; }

        /* 8. 中間 + 號佈局 */
        .canvas-area { 
            flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; 
            position: relative; background: #fffafb; display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }
        #myCanvas { max-width: 100%; max-height: 100%; touch-action: none; z-index: 5; }
        .plus-icon { font-size: 60px; color: #ffabbd; position: absolute; pointer-events: none; z-index: 1; }
        .canvas-area.has-img .plus-icon { display: none; }

        .bottom-action-bar { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        .bottom-action-bar button { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 12px; background: var(--pink-accent); box-shadow: 0 3px 0 #e66a85; }
        .bottom-action-bar button:active { transform: translateY(2px); box-shadow: none; }

        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 101; box-shadow: 0 10px 50px rgba(0,0,0,0.2); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="sticker-grid" id="stickerGrid"></div>
        <div class="text-to-sticker-area">
            <div class="text-input-group">
                <input type="text" id="stickerTextInput" placeholder="輸入顏文字 (づ｡◕‿◕｡)づ">
                <button onclick="generateTextStickers()">生成</button>
            </div>
            <div class="slider-label"><span>文字整體縮放</span><span id="textScaleVal">3.0</span></div>
            <input type="range" id="textScaleSlider" min="10" max="100" value="30">
            <div class="slider-label"><span>鑽石密度 (雙數步進)</span><span id="densityVal">6</span></div>
            <input type="range" id="densitySlider" min="2" max="12" value="6" step="2" oninput="document.getElementById('densityVal').innerText=this.value">
        </div>
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div style="flex:1">
                <div class="slider-label"><span>單顆鑽石大小</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="300" value="80">
                <div class="slider-label"><span>單顆旋轉角度</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotateSlider" min="0" max="360" value="0">
            </div>
        </div>
    </div>

    <div class="notebook-rings">
        <script>for(let i=0; i<6; i++) document.write('<div class="ring"></div>');</script>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone" onclick="handleCanvasClick(event)">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button style="background:#ffabbd" onclick="smartUndo()">撤銷</button>
            <button style="background:#ffccbb" onclick="generateRandomDiamonds()">隨機鑽石</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker"></div>
    <button onclick="closePicker()" style="margin-top:15px; background:var(--pink-accent); width:100%; color:white; border:none; padding:10px; border-radius:10px;">完成</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput'), dropZone = document.getElementById('dropZone');
    let mainImg = new Image(), stickers = [], records = [], textLayers = [];
    let curIdx = 0, currentColor = "#FFB7B2", preRenderedSticker = null, selectedLayer = null;
    let isDragging = false;

    async function init() {
        for(let i=1; i<=6; i++) {
            const img = new Image(); img.src = `sticker${i}.png`; stickers.push(img);
            const imgEl = document.createElement('img'); imgEl.src = img.src; imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
            imgEl.onclick = (e) => { 
                curIdx = i-1; 
                document.querySelectorAll('.sticker-item').forEach(el=>el.classList.remove('active'));
                imgEl.classList.add('active'); 
                updatePreRender(); 
            };
            document.getElementById('stickerGrid').appendChild(imgEl);
        }
        updatePreRender();
    }

    function updatePreRender() {
        const sImg = stickers[curIdx]; if (!sImg.complete) return;
        const oc = document.createElement('canvas'), ox = oc.getContext('2d');
        oc.width = oc.height = 100;
        ox.drawImage(sImg, 0, 0, 100, 100);
        ox.globalCompositeOperation="multiply"; ox.fillStyle=currentColor; ox.fillRect(0,0,100,100);
        ox.globalCompositeOperation="destination-in"; ox.drawImage(sImg, 0, 0, 100, 100);
        preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
        if(selectedLayer) { selectedLayer.img = preRenderedSticker; draw(); }
    }

    // 生成功能修復
    function generateTextStickers() {
        if (!mainImg.src) return imgInput.click();
        const text = document.getElementById('stickerTextInput').value; if (!text) return;
        
        const fontSize = 60;
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.font = `bold ${fontSize}px Arial, "Microsoft YaHei"`;
        const tw = tempCtx.measureText(text).width;
        
        tempCanvas.width = tw + 60;
        tempCanvas.height = fontSize * 2;
        tempCtx.font = `bold ${fontSize}px Arial, "Microsoft YaHei"`;
        tempCtx.textBaseline = 'middle';
        tempCtx.textAlign = 'center';
        tempCtx.fillStyle = 'black';
        tempCtx.fillText(text, tempCanvas.width / 2, tempCanvas.height / 2);

        const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
        const step = parseInt(document.getElementById('densitySlider').value);
        const points = [];
        for (let y = 0; y < tempCanvas.height; y += step) {
            for (let x = 0; x < tempCanvas.width; x += step) {
                if (imgData[(y * tempCanvas.width + x) * 4 + 3] > 100) {
                    points.push({ dx: x - tempCanvas.width / 2, dy: y - tempCanvas.height / 2 });
                }
            }
        }
        
        const layer = { 
            points, 
            x: canvas.width / 2, 
            y: canvas.height / 2, 
            scale: parseInt(document.getElementById('textScaleSlider').value) / 10, 
            img: preRenderedSticker, 
            dotSize: parseInt(document.getElementById('sizeSlider').value) / 6 
        };
        textLayers.push(layer);
        selectedLayer = layer;
        draw();
    }

    function generateRandomDiamonds() {
        if (!mainImg.src) return;
        const count = 15; let group = [];
        for(let i=0; i<count; i++) {
            group.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, img: preRenderedSticker, size: Math.random()*50+30, angle: Math.random()*Math.PI*2 });
        }
        records.push(group); draw();
    }

    function handleCanvasClick(e) {
        if (!mainImg.src) { imgInput.click(); return; }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
        
        records.flat().forEach(r => {
            ctx.save(); ctx.translate(r.x, r.y); ctx.rotate(r.angle || 0);
            ctx.drawImage(r.img, -r.size/2, -r.size/2, r.size, r.size); ctx.restore();
        });

        textLayers.forEach(l => {
            l.points.forEach(p => {
                ctx.drawImage(l.img, l.x + p.dx * l.scale - l.dotSize/2, l.y + p.dy * l.scale - l.dotSize/2, l.dotSize, l.dotSize);
            });
            if(l === selectedLayer) {
                const bw = (l.points.length > 50 ? 120 : 60) * l.scale, bh = 30 * l.scale;
                ctx.strokeStyle="#ff85a2"; ctx.setLineDash([5,5]); ctx.strokeRect(l.x-bw, l.y-bh, bw*2, bh*2);
                ctx.setLineDash([]); ctx.fillStyle="#ff85a2"; ctx.beginPath(); ctx.arc(l.x+bw, l.y+bh, 12, 0, Math.PI*2); ctx.fill();
            }
        });
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - r.left) * (canvas.width / r.width), y: (clientY - r.top) * (canvas.height / r.height) };
    };

    canvas.addEventListener('touchstart', (e) => {
        const p = getPos(e); if(!mainImg.src) return;
        let found = null;
        textLayers.forEach(l => { if(Math.abs(p.x-l.x) < 80*l.scale && Math.abs(p.y-l.y) < 40*l.scale) found=l; });
        if(found) { selectedLayer = found; isDragging = true; }
        else { 
            selectedLayer = null; 
            records.push([{ x:p.x, y:p.y, img:preRenderedSticker, size:parseInt(document.getElementById('sizeSlider').value), angle:parseInt(document.getElementById('rotateSlider').value)*Math.PI/180 }]); 
        }
        draw();
    });

    canvas.addEventListener('touchmove', (e) => {
        if(isDragging && selectedLayer) { const p = getPos(e); selectedLayer.x=p.x; selectedLayer.y=p.y; draw(); }
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', () => isDragging=false);

    // 控件交互同步
    document.getElementById('sizeSlider').oninput = function() { 
        document.getElementById('sizeVal').innerText = this.value;
        if(selectedLayer) { selectedLayer.dotSize = this.value/6; draw(); }
    };
    document.getElementById('rotateSlider').oninput = function() { document.getElementById('rotVal').innerText = this.value + "°"; };
    document.getElementById('textScaleSlider').oninput = function() { 
        document.getElementById('textScaleVal').innerText = (this.value/10).toFixed(1);
        if(selectedLayer) { selectedLayer.scale = this.value/10; draw(); }
    };

    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 180, color: currentColor });
    colorPicker.on('color:change', (c) => { currentColor = c.hexString; document.getElementById('colorBtn').style.backgroundColor = currentColor; updatePreRender(); });
    document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display='block'; document.getElementById('overlay').style.display='block'; };
    
    function closePicker() { document.getElementById('pickerContainer').style.display='none'; document.getElementById('overlay').style.display='none'; }
    function smartUndo() { if(selectedLayer){ textLayers=textLayers.filter(l=>l!==selectedLayer); selectedLayer=null; } else records.pop(); draw(); }
    function download() { const link = document.createElement('a'); link.download='sticker_book.png'; link.href=canvas.toDataURL(); link.click(); }
    
    imgInput.onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => { 
            mainImg = new Image();
            mainImg.onload = () => { 
                canvas.width = mainImg.width; canvas.height = mainImg.height; 
                dropZone.classList.add('has-img'); draw(); 
            }; 
            mainImg.src = f.target.result; 
        };
        reader.readAsDataURL(file);
    };
    init();
</script>
</body>
</html>
