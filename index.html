<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>钻石贴纸编辑器</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { font-size: 1.2rem; color: #333; }
        #myCanvas { border: 2px solid #eee; border-radius: 10px; max-width: 100%; height: auto; margin-top: 10px; background: #fafafa; display: block; margin-left: auto; margin-right: auto; }
        .sticker-menu { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .sticker-btn { width: 55px; height: 55px; border: 3px solid #eee; border-radius: 10px; cursor: pointer; background: #fff; object-fit: contain; }
        .sticker-btn.active { border-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.3); }
        .upload-section { background: #eef2f5; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        input[type="file"] { width: 100%; font-size: 14px; }
        .btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 钻石贴纸编辑器</h2>
    
    <div class="upload-section">
        <p style="margin:0 0 8px 0; font-size:14px; color:#666;">第一步：上传背景照片</p>
        <input type="file" id="imgInput" accept="image/*">
    </div>

    <div class="sticker-menu">
        <img src="sticker1.png" class="sticker-btn active" onclick="sel(0, this)">
        <img src="sticker2.png" class="sticker-btn" onclick="sel(1, this)">
        <img src="sticker3.png" class="sticker-btn" onclick="sel(2, this)">
    </div>

    <canvas id="myCanvas"></canvas>
    
    <div class="btns">
        <button style="background:#ff4d4f" onclick="undo()">撤销一步</button>
        <button style="background:#52c41a" onclick="download()">保存图片</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;

    // 预加载贴纸 (根据你截图的文件名)
    const stkNames = ['sticker1.png', 'sticker2.png', 'sticker3.png'];
    stkNames.forEach((src, index) => {
        let img = new Image();
        img.src = src;
        stickers[index] = img;
    });

    // 修复手机上传逻辑
    document.getElementById('imgInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            // 先重置图片对象，确保重新触发 onload
            mainImg = new Image();
            mainImg.onload = function() {
                // 自动调整画布尺寸匹配图片
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                draw();
            };
            mainImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function sel(idx, el) {
        curIdx = idx;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // 同时支持鼠标和手指点击
    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault(); // 防止手机滑动
        const touch = e.touches[0];
        handleClick(touch);
    }, { passive: false });

    function handleClick(e) {
        if(!mainImg.src || mainImg.src === "") return;
        
        const rect = canvas.getBoundingClientRect();
        // 计算真实缩放比例
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        records.push({ x, y, idx: curIdx });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.complete && mainImg.src) {
            ctx.drawImage(mainImg, 0, 0);
        }
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if (sImg.complete) {
                let size = canvas.width * 0.15; // 贴纸大小为宽度的 15%
                ctx.drawImage(sImg, r.x - size/2, r.y - size/2, size, size);
            }
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return alert("请先上传背景！");
        const dataUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'my_diamond_photo.png';
        link.href = dataUrl;
        link.click();
    }
</script>

</body>
</html>
