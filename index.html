<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>钻石贴纸编辑器 (可调大小版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #myCanvas { border: 2px solid #eee; border-radius: 10px; max-width: 100%; height: auto; margin-top: 10px; background: #fafafa; display: block; margin-left: auto; margin-right: auto; }
        .sticker-menu { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .sticker-btn { width: 55px; height: 55px; border: 3px solid #eee; border-radius: 10px; cursor: pointer; background: #fff; object-fit: contain; }
        .sticker-btn.active { border-color: #007bff; }
        
        /* 新增控制条样式 */
        .control-panel { background: #f0f4f8; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .slider-label { font-size: 14px; color: #333; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 80%; cursor: pointer; }

        .upload-section { background: #eef2f5; padding: 10px; border-radius: 8px; }
        .btns { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-section">
        <p style="margin:0 0 8px 0; font-size:14px; color:#666;">第一步：上传照片</p>
        <input type="file" id="imgInput" accept="image/*">
    </div>

    <div class="sticker-menu">
        <img src="sticker1.png" class="sticker-btn active" onclick="sel(0, this)">
        <img src="sticker2.png" class="sticker-btn" onclick="sel(1, this)">
        <img src="sticker3.png" class="sticker-btn" onclick="sel(2, this)">
    </div>

    <div class="control-panel">
        <span class="slider-label">调节钻石大小: <span id="sizeVal">50</span></span>
        <input type="range" id="sizeSlider" min="10" max="200" value="50" oninput="updateSizeDisplay(this.value)">
    </div>

    <canvas id="myCanvas"></canvas>
    
    <div class="btns">
        <button style="background:#ff4d4f" onclick="undo()">撤销一步</button>
        <button style="background:#52c41a" onclick="download()">保存图片</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeValLabel = document.getElementById('sizeVal');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;
    let currentStickerSize = 50; // 默认大小

    // 预加载贴纸
    const stkNames = ['sticker1.png', 'sticker2.png', 'sticker3.png'];
    stkNames.forEach((src, index) => {
        let img = new Image();
        img.src = src;
        stickers[index] = img;
    });

    // 更新大小显示的数值
    function updateSizeDisplay(val) {
        currentStickerSize = parseInt(val);
        sizeValLabel.innerText = val;
    }

    document.getElementById('imgInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            mainImg = new Image();
            mainImg.onload = function() {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                draw();
            };
            mainImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function sel(idx, el) {
        curIdx = idx;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // 兼容手机和电脑点击
    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleClick(e.touches[0]);
    }, { passive: false });

    function handleClick(e) {
        if(!mainImg.src || mainImg.src === "") return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        // 记录时同时记录当时的大小
        records.push({ 
            x: x, 
            y: y, 
            idx: curIdx, 
            size: currentStickerSize 
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            // 使用记录时的大小，这样不同的钻石可以有不同的大小
            ctx.drawImage(sImg, r.x - r.size/2, r.y - r.size/2, r.size, r.size);
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return alert("请先上传背景！");
        const link = document.createElement('a');
        link.download = 'deco_photo.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
