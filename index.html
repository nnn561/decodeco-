<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pancake Sticker Book</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root {
            --book-cover: #fabecc;
            --page-white: #ffffff;
            --pink-accent: #ff85a2;
            --ring-gray: #888888;
        }

        body { 
            font-family: "Comic Sans MS", "curstive", sans-serif; 
            margin: 0; padding: 20px 10px; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-color: #ffeef4; 
            overflow-x: hidden;
        }

        /* 1. 動態雲朵背景（覆蓋全屏） */
        .cloud { position: fixed; background: #fff; border-radius: 100px; opacity: 0.6; pointer-events: none; z-index: -1; }
        .cloud:after, .cloud:before { content: ''; position: absolute; background: #fff; border-radius: 100px; }
        .c1 { width: 120px; height: 45px; top: 15%; animation: moveClouds 30s linear infinite; }
        .c1:after { width: 60px; height: 60px; top: -30px; left: 20px; }
        .c2 { width: 180px; height: 70px; top: 50%; animation: moveClouds 45s linear infinite; opacity: 0.4; }
        .c2:after { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c3 { width: 100px; height: 40px; top: 80%; animation: moveClouds 25s linear infinite; }
        @keyframes moveClouds { from { left: -200px; } to { left: 100vw; } }

        /* 2. 拼貼風標題 */
        .title-header {
            font-size: 32px; color: #fff; font-weight: bold; margin-bottom: 25px;
            text-shadow: 2px 2px 0px var(--pink-accent), 4px 4px 0px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* 3. 帶厚度的書本容器 */
        .book-container { 
            width: 100%; max-width: 460px; 
            background: var(--book-cover); 
            padding: 18px; 
            border-radius: 10px 40px 40px 10px;
            /* 模擬書脊與側面厚度 */
            box-shadow: 
                -5px 0 0px #e097aa, 
                -10px 0 0px #d48a9d,
                5px 5px 20px rgba(0,0,0,0.1),
                10px 15px 40px rgba(214, 51, 132, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* 4. 1:1 分頁設計 */
        .top-page, .bottom-page { 
            background: var(--page-white); 
            flex: 1;
            min-height: 320px; /* 強制 1:1 視覺 */
            padding: 20px; 
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.02);
        }
        .top-page { border-radius: 8px 15px 0 0; border-bottom: 1px solid #eee; }
        .bottom-page { border-radius: 0 0 15px 8px; display: flex; flex-direction: column; }

        /* 5. 真實感線圈 */
        .notebook-rings { 
            height: 40px; display: flex; justify-content: space-around; 
            padding: 0 25px; z-index: 20; margin: -20px 0; pointer-events: none;
        }
        .ring-set { display: flex; flex-direction: column; align-items: center; }
        .hole { width: 10px; height: 10px; background: #ddd; border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2); }
        .ring { 
            width: 12px; height: 45px; 
            background: linear-gradient(to right, #777, #bbb, #777); 
            border-radius: 6px; 
            margin: -5px 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* 6. 功能按鈕移至貼紙層 */
        .sticker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 15px; }
        .sticker-item { width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 1.5px solid #f0f0f0; background: #fff; }
        .sticker-item.active { border-color: var(--pink-accent); transform: scale(1.15); box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }

        .top-action-bar { display: flex; gap: 8px; margin-top: 15px; }
        .top-action-bar button { 
            flex: 1; padding: 10px 5px; border: none; border-radius: 12px; 
            color: white; font-weight: bold; cursor: pointer; font-size: 12px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1); transition: 0.2s;
        }
        .btn-undo { background: #ffabbd; }
        .btn-random { background: #ffccbb; }
        .btn-save { background: var(--pink-accent); }
        button:active { transform: translateY(2px); box-shadow: none; }

        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .current-color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .slider-group { flex: 1; margin-left: 15px; display: flex; flex-direction: column; gap: 8px; }

        /* 7. 畫布區域 */
        .canvas-area {
            flex: 1; position: relative; border: 2px dashed #ffcad4; border-radius: 15px; 
            margin: 10px 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #fffafb; cursor: pointer; overflow: hidden;
        }
        #myCanvas { max-width: 100%; height: auto; display: block; touch-action: none; z-index: 5; }
        .plus-icon { font-size: 50px; color: #ffabbd; pointer-events: none; }
        .canvas-area.has-img { border: none; background: transparent; }
        .canvas-area.has-img .plus-icon { display: none; }

        /* 色盤 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
        #pickerContainer {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 25px; z-index: 101; text-align: center; width: 260px;
        }
        .color-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div class="overlay" id="overlay"></div>

<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="sticker-grid" id="stickerGrid"></div>
        
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div class="slider-group">
                <input type="range" id="sizeSlider" min="50" max="500" value="80" style="width: 100%; accent-color: var(--pink-accent);">
                <input type="range" id="rotateSlider" min="0" max="360" value="0" style="width: 100%; accent-color: var(--pink-accent);">
            </div>
        </div>

        <div class="top-action-bar">
            <button class="btn-undo" onclick="smartUndo()">撤銷動作</button>
            <button class="btn-random" onclick="generateRandomDiamonds()">隨機鑽石</button>
            <button class="btn-save" onclick="download()">保存手帳</button>
        </div>
    </div>

    <div class="notebook-rings">
        <script>
            for(let i=0; i<6; i++) {
                document.write(`
                    <div class="ring-set">
                        <div class="hole"></div>
                        <div class="ring"></div>
                        <div class="hole"></div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker" style="display: flex; justify-content: center;"></div>
    <div class="color-row" id="presets"></div>
    <button onclick="closePicker()" style="margin-top:15px; background:var(--pink-accent); width:100%; border-radius: 12px; height: 40px; color:white; border:none; font-weight:bold;">完成選擇</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput');
    const dropZone = document.getElementById('dropZone');
    
    let mainImg = new Image(), stickers = [], records = [], curIdx = 0;
    let currentColor = "#FFB7B2", preRenderedSticker = null, randomClickCount = 0;
    const macaronColors = ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#F3B0C3'];

    async function init() {
        for(let i=1; i<=6; i++) {
            const img = new Image(); img.src = `sticker${i}.png`; stickers.push(img);
            const imgEl = document.createElement('img'); imgEl.src = img.src; imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
            imgEl.onclick = (e) => {
                e.stopPropagation(); curIdx = i - 1;
                document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
                imgEl.classList.add('active'); updatePreRender();
            };
            document.getElementById('stickerGrid').appendChild(imgEl);
        }
        const presetBox = document.getElementById('presets');
        macaronColors.forEach(c => {
            const d = document.createElement('div'); d.className = 'dot'; d.style.backgroundColor = c;
            d.onclick = () => colorPicker.color.set(c); presetBox.appendChild(d);
        });
        updatePreRender();
    }

    function updatePreRender() {
        const sImg = stickers[curIdx]; if (!sImg || !sImg.complete) return;
        const size = 300; const ratio = sImg.width / sImg.height;
        let dw = ratio > 1 ? size : size * ratio, dh = ratio > 1 ? size / ratio : size;
        const oc = document.createElement('canvas'); const ox = oc.getContext('2d');
        oc.width = dw; oc.height = dh;
        ox.drawImage(sImg, 0, 0, dw, dh);
        ox.globalCompositeOperation = "multiply"; ox.fillStyle = currentColor; ox.fillRect(0, 0, dw, dh);
        ox.globalCompositeOperation = "destination-in"; ox.drawImage(sImg, 0, 0, dw, dh);
        preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
    }

    dropZone.onclick = (e) => { if (!mainImg.src || e.target !== canvas) imgInput.click(); };
    imgInput.onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                canvas.width = mainImg.width; canvas.height = mainImg.height;
                dropZone.classList.add('has-img'); records = []; draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    let isDrawing = false;
    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    };

    const paint = (e) => {
        if(!mainImg.src || !preRenderedSticker) return;
        const p = getPos(e);
        const now = Date.now();
        const rec = { 
            x: p.x, y: p.y, img: preRenderedSticker, 
            size: parseInt(document.getElementById('sizeSlider').value), 
            angle: (parseInt(document.getElementById('rotateSlider').value)*Math.PI)/180,
            time: now 
        };

        if (records.length === 0) {
            records.push([rec]);
        } else {
            const lastGroup = records[records.length - 1];
            const lastPoint = lastGroup[lastGroup.length - 1];
            if (lastPoint && (now - lastPoint.time < 100)) {
                lastGroup.push(rec);
            } else {
                records.push([rec]);
            }
        }
        draw();
    };

    canvas.onmousedown = (e) => { isDrawing = true; paint(e); };
    canvas.onmousemove = (e) => { if(isDrawing) paint(e); };
    window.onmouseup = () => isDrawing = false;
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; paint(e.touches[0]); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(isDrawing) paint(e.touches[0]); }, {passive: false});
    canvas.addEventListener('touchend', () => isDrawing = false);

    function generateRandomDiamonds() {
        if (!mainImg.src) return;
        randomClickCount++;
        const count = 10; const group = [];
        for (let i = 0; i < count; i++) {
            const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
            const size = 80 + Math.random() * 150;
            let color = (randomClickCount % 3 === 0) ? `hsl(${Math.random()*360}, 70%, 80%)` : currentColor;
            const sImg = stickers[Math.floor(Math.random()*stickers.length)];
            const tc = document.createElement('canvas'); const tx = tc.getContext('2d');
            tc.width = 150; tc.height = 150;
            tx.drawImage(sImg, 0, 0, 150, 150);
            tx.globalCompositeOperation = "multiply"; tx.fillStyle = color; tx.fillRect(0,0,150,150);
            tx.globalCompositeOperation = "destination-in"; tx.drawImage(sImg, 0, 0, 150, 150);
            const ri = new Image(); ri.src = tc.toDataURL();
            group.push({ x, y, img: ri, size, angle: Math.random()*Math.PI*2, time: Date.now() });
        }
        records.push(group); draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        records.flat().forEach(r => {
            const dw = r.size, dh = r.size * (r.img.height / r.img.width);
            ctx.save(); ctx.translate(r.x, r.y); ctx.rotate(r.angle);
            ctx.drawImage(r.img, -dw/2, -dh/2, dw, dh); ctx.restore();
        });
    }

    function smartUndo() { if (records.length > 0) { records.pop(); draw(); } }
    function download() { if(!mainImg.src) return; const link = document.createElement('a'); link.download = 'my_sticker_book.png'; link.href = canvas.toDataURL(); link.click(); }

    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 180, color: currentColor });
    colorPicker.on('color:change', (color) => { currentColor = color.hexString; document.getElementById('colorBtn').style.backgroundColor = currentColor; updatePreRender(); });
    document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    function closePicker() { document.getElementById('pickerContainer').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

    init();
</script>
</body>
</html>
