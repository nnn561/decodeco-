<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Sticker Book</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; --spine-pink: #f8a5bc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 15px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #ffeef4; }
        .title-header { font-size: 24px; color: #fff; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 0px var(--pink-accent); text-align: center; }
        .book-container { width: 94%; max-width: 420px; background: var(--book-cover); padding: 12px; border-radius: 15px 40px 40px 15px; box-shadow: 0 20px 40px rgba(214, 51, 132, 0.2); position: relative; display: flex; flex-direction: column; margin: 0 auto; }
        .top-page, .bottom-page { background: var(--page-white); padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; box-shadow: inset 1px 1px 10px rgba(0,0,0,0.03); }
        .top-page { border-radius: 12px 25px 0 0; z-index: 2; min-height: 300px; }
        .bottom-page { border-radius: 0 0 25px 12px; min-height: 380px; z-index: 2; }
        .spine-area { height: 30px; background: var(--spine-pink); width: 100%; position: relative; z-index: 5; margin: -5px 0; display: flex; justify-content: space-around; align-items: center; }
        .ring { width: 10px; height: 45px; background: var(--ring-gray); border-radius: 5px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3); }
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; min-height: 140px; margin-bottom: 5px; justify-items: center; align-content: start; }
        .sticker-item { width: 58px; height: 58px; border-radius: 10px; border: 2px solid #f0f0f0; background: #fff; padding: 5px; cursor: pointer; transition: all 0.2s; object-fit: contain; }
        .sticker-item.active { border-color: var(--pink-accent); background: #fffafb; transform: scale(1.1); }
        .page-ctrl { display: flex; gap: 15px; margin-bottom: 15px; width: 100%; justify-content: center; }
        .page-ctrl button { background: #fff; color: var(--pink-accent); border: 1px solid #ffcad4; border-radius: 6px; padding: 3px 12px; font-size: 11px; font-weight: bold; }
        .page-ctrl button.active { background: var(--pink-accent); color: white; }
        .text-to-sticker-area { width: 100%; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; margin-bottom: 10px; }
        .text-input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .text-input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; font-size: 14px; }
        .text-input-group button { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; margin-top: 5px; }
        input[type=range] { accent-color: var(--pink-accent); width: 100%; }
        .controls { display: flex; align-items: center; gap: 12px; width: 100%; }
        .current-color-dot { width: 48px; height: 48px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .canvas-area { flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; position: relative; background: #fffafb; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 10px; min-height: 200px; }
        #myCanvas { max-width: 100%; max-height: 100%; touch-action: none; z-index: 6; }
        .plus-icon { font-size: 60px; color: #ffabbd; position: absolute; pointer-events: none; }
        .canvas-area.has-img .plus-icon { display: none; }
        .bottom-action-bar { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        .bottom-action-bar button { flex: 1; padding: 12px 2px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; background: var(--pink-accent); }
        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 101; box-shadow: 0 10px 50px rgba(0,0,0,0.2); width: 280px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="sticker-grid" id="stickerGrid"></div>
        <div class="page-ctrl">
            <button id="pageBtn1" class="active" onclick="renderStickers(1)">第一頁</button>
            <button id="pageBtn2" onclick="renderStickers(2)">下一頁</button>
        </div>
        <div class="text-to-sticker-area">
            <div class="text-input-group">
                <input type="text" id="stickerTextInput" placeholder="輸入文字生成貼紙">
                <button onclick="generateTextStickers()">生成</button>
            </div>
            <div class="slider-label"><span>貼紙大小</span><span id="textScaleVal">3.0</span></div>
            <input type="range" id="textScaleSlider" min="10" max="100" value="30">
        </div>
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div style="flex:1">
                <div class="slider-label"><span>鑽石大小</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="300" value="80">
            </div>
        </div>
    </div>
    <div class="spine-area">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>
    <div class="bottom-page">
        <div class="canvas-area" id="dropZone" onclick="if(!mainImg.src)imgInput.click()">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button onclick="smartUndo()">撤銷</button>
            <button onclick="clearAll()">清空</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker"></div>
    <button onclick="closePicker()" style="margin-top:12px; background:var(--pink-accent); width:100%; color:white; border:none; padding:10px; border-radius:10px;">確定</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), mainCtx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput'), dropZone = document.getElementById('dropZone');
    let mainImg = new Image(), stickers = [], records = [], textLayers = [];
    let curIdx = 0, currentColor = "#FFB7B2", preRenderedSticker = null, selectedLayer = null;
    let isDragging = false;

    // *** 這裡修改為你的實際倉庫地址 ***
    const baseUrl = "https://raw.githubusercontent.com/nnn561/decodeco-/main/";

    async function init() {
        let loaded = 0;
        for(let i=1; i<=9; i++) {
            const img = new Image();
            img.crossOrigin = "anonymous"; // 避免跨域問題
            img.onload = () => {
                loaded++;
                if(loaded === 9) renderStickers(1);
            };
            // 嘗試讀取 .png，如果失敗請檢查 GitHub 上是否為大寫 .PNG
            img.src = `${baseUrl}sticker${i}.png`;
            stickers.push(img);
        }
    }

    function renderStickers(page) {
        const grid = document.getElementById('stickerGrid');
        grid.innerHTML = '';
        const start = page === 1 ? 0 : 6;
        const end = page === 1 ? 6 : 9;
        for(let i=start; i<end; i++) {
            const imgEl = document.createElement('img');
            imgEl.src = stickers[i].src;
            imgEl.className = 'sticker-item' + (curIdx === i ? ' active' : '');
            imgEl.onclick = () => {
                curIdx = i;
                document.querySelectorAll('.sticker-item').forEach(el=>el.classList.remove('active'));
                imgEl.classList.add('active');
                updatePreRender();
            };
            grid.appendChild(imgEl);
        }
        updatePreRender();
    }

    function updatePreRender() {
        const sImg = stickers[curIdx];
        if(!sImg.complete) return;
        const oc = document.createElement('canvas'), ox = oc.getContext('2d');
        oc.width = 100; oc.height = 100;
        ox.drawImage(sImg, 0, 0, 100, 100);
        ox.globalCompositeOperation="multiply"; ox.fillStyle=currentColor; ox.fillRect(0,0,100,100);
        ox.globalCompositeOperation="destination-in"; ox.drawImage(sImg, 0, 0, 100, 100);
        preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
    }

    function draw() {
        mainCtx.clearRect(0,0,canvas.width,canvas.height);
        if(mainImg.src) mainCtx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
        records.flat().forEach(r => {
            mainCtx.drawImage(r.img, r.x - r.size/2, r.y - r.size/2, r.size, r.size);
        });
        textLayers.forEach(l => {
            l.points.forEach(p => {
                mainCtx.drawImage(l.img, l.x + p.dx * l.scale, l.y + p.dy * l.scale, l.dotSize, l.dotSize);
            });
        });
    }

    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 200, color: currentColor });
    colorPicker.on('color:change', (c) => { 
        currentColor = c.hexString; 
        document.getElementById('colorBtn').style.backgroundColor = currentColor;
        updatePreRender();
    });

    document.getElementById('colorBtn').onclick = () => { 
        document.getElementById('pickerContainer').style.display='block'; 
        document.getElementById('overlay').style.display='block'; 
    };
    function closePicker() { 
        document.getElementById('pickerContainer').style.display='none'; 
        document.getElementById('overlay').style.display='none'; 
    }

    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg.onload = () => {
                canvas.width = mainImg.width; canvas.height = mainImg.height;
                dropZone.classList.add('has-img'); draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    canvas.addEventListener('touchstart', (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches[0].clientX - r.left) * (canvas.width / r.width);
        const y = (e.touches[0].clientY - r.top) * (canvas.height / r.height);
        const size = parseInt(document.getElementById('sizeSlider').value);
        records.push([{ x, y, img: preRenderedSticker, size }]);
        draw();
    });

    function smartUndo() { records.pop(); draw(); }
    function clearAll() { records = []; textLayers = []; draw(); }
    function download() { const link = document.createElement('a'); link.download='pancake.png'; link.href=canvas.toDataURL(); link.click(); }

    init();
</script>
</body>
</html>
