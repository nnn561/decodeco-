<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sticker Book Pro - Kaomoji Support</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; background-color: #ffeef4; }
        
        /* 書本容器 */
        .book-container { width: 100%; max-width: 440px; background: var(--book-cover); padding: 12px; border-radius: 15px 40px 40px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        .top-page, .bottom-page { background: var(--page-white); padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .top-page { border-radius: 12px 25px 0 0; }
        .bottom-page { border-radius: 0 0 25px 12px; min-height: 380px; margin-top: 15px; }

        /* 貼紙列表優化 */
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 15px; }
        .sticker-item { 
            width: 70px; height: 70px; border-radius: 12px; cursor: pointer; border: 2px solid #f0f0f0; 
            background: #fff; padding: 5px; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain; /* 確保正比例 */
        }
        /* 點擊時的發光和傾斜動畫 */
        .sticker-item:active { transform: scale(1.1) rotate(15deg); border-color: var(--pink-accent); box-shadow: 0 0 15px var(--pink-accent); }
        .sticker-item.active { border-color: var(--pink-accent); background: #fffafb; }

        /* 文字/顏文字輸入區 */
        .text-to-sticker-area { width: 100%; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; margin-bottom: 10px; box-sizing: border-box; }
        .text-input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .text-input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; }
        .text-input-group button { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; }

        /* 滑塊控制區 */
        .controls { display: grid; grid-template-columns: 50px 1fr; gap: 10px; width: 100%; align-items: center; margin-bottom: 10px; }
        .current-color-dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; }
        input[type=range] { accent-color: var(--pink-accent); margin: 2px 0; }

        /* 畫布與操作 */
        .canvas-area { flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; margin-bottom: 10px; position: relative; background: #fffafb; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #myCanvas { max-width: 100%; height: auto; touch-action: none; z-index: 5; }

        .bottom-action-bar { display: flex; gap: 8px; width: 100%; }
        .bottom-action-bar button { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 12px; background: var(--pink-accent); }

        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 101; box-shadow: 0 10px 50px rgba(0,0,0,0.2); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="book-container">
    <div class="top-page">
        <div class="sticker-grid" id="stickerGrid"></div>
        <div class="text-to-sticker-area">
            <div class="text-input-group">
                <input type="text" id="stickerTextInput" placeholder="輸入長顏文字 (づ｡◕‿‿◕｡)づ">
                <button onclick="generateTextStickers()">生成</button>
            </div>
            <div class="slider-label"><span>文字縮放</span><span id="textScaleVal">3.0</span></div>
            <input type="range" id="textScaleSlider" min="10" max="100" value="30" style="width:100%">
        </div>
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div class="slider-group">
                <div class="slider-label"><span>鑽石大小</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="300" value="80">
            </div>
        </div>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone">
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button style="background:#ffabbd" onclick="smartUndo()">撤銷</button>
            <button style="background:#ffccbb" onclick="clearAll()">清空</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker"></div>
    <button onclick="closePicker()" style="margin-top:15px; background:var(--pink-accent); width:100%; color:white; border:none; padding:10px; border-radius:10px;">完成</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput'), dropZone = document.getElementById('dropZone');
    let mainImg = new Image(), stickers = [], records = [], textLayers = [];
    let curIdx = 0, currentColor = "#FFB7B2", preRenderedSticker = null, selectedLayer = null;

    async function init() {
        for(let i=1; i<=6; i++) {
            const img = new Image(); img.src = `sticker${i}.png`; stickers.push(img);
            const imgEl = document.createElement('img'); imgEl.src = img.src; imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
            imgEl.onclick = () => { 
                curIdx = i-1; 
                document.querySelectorAll('.sticker-item').forEach(el=>el.classList.remove('active'));
                imgEl.classList.add('active'); 
                updatePreRender(); 
            };
            document.getElementById('stickerGrid').appendChild(imgEl);
        }
        updatePreRender();
    }

    function updatePreRender() {
        const sImg = stickers[curIdx]; if (!sImg.complete) return;
        const oc = document.createElement('canvas'), ox = oc.getContext('2d');
        oc.width = oc.height = 100;
        ox.drawImage(sImg, 0, 0, 100, 100);
        ox.globalCompositeOperation = "multiply"; ox.fillStyle = currentColor; ox.fillRect(0,0,100,100);
        ox.globalCompositeOperation = "destination-in"; ox.drawImage(sImg, 0, 0, 100, 100);
        preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
        if(selectedLayer) { selectedLayer.img = preRenderedSticker; draw(); }
    }

    // 長顏文字生成邏輯優化
    function generateTextStickers() {
        if (!mainImg.src) return imgInput.click();
        const text = document.getElementById('stickerTextInput').value; if (!text) return;
        
        const fontSize = 60; const tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d', {willReadFrequently:true});
        tempCtx.font = `bold ${fontSize}px Arial`;
        const textWidth = tempCtx.measureText(text).width;
        tempCanvas.width = textWidth + 40; tempCanvas.height = fontSize * 1.5;
        
        tempCtx.font = `bold ${fontSize}px Arial`; tempCtx.textBaseline = 'middle'; tempCtx.textAlign = 'center';
        tempCtx.fillStyle = 'black'; tempCtx.fillText(text, tempCanvas.width/2, tempCanvas.height/2);
        
        const imgData = tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height).data;
        const step = 6, points = [];
        for (let y=0; y<tempCanvas.height; y+=step) {
            for (let x=0; x<tempCanvas.width; x+=step) {
                if (imgData[(y*tempCanvas.width+x)*4 + 3] > 120) points.push({ dx: x - tempCanvas.width/2, dy: y - tempCanvas.height/2 });
            }
        }
        
        const scaleVal = parseInt(document.getElementById('textScaleSlider').value) / 10;
        const layer = { points, x: canvas.width/2, y: canvas.height/2, scale: scaleVal, img: preRenderedSticker, dotSize: parseInt(document.getElementById('sizeSlider').value)/6 };
        textLayers.push(layer); selectedLayer = layer; draw();
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg,0,0);
        records.flat().forEach(r => renderSticker(r.img, r.x, r.y, r.size));
        textLayers.forEach(l => {
            l.points.forEach(p => renderSticker(l.img, l.x + p.dx * l.scale, l.y + p.dy * l.scale, l.dotSize));
            if(l === selectedLayer) {
                // 畫操作框和小按鈕
                ctx.strokeStyle = "rgba(255,133,162,0.8)"; ctx.setLineDash([5,5]);
                const w = 150 * l.scale * 0.5, h = 40 * l.scale * 0.5;
                ctx.strokeRect(l.x - w, l.y - h, w*2, h*2);
                ctx.setLineDash([]);
                // 右下角拖動手柄
                ctx.fillStyle = "#ff85a2"; ctx.beginPath();
                ctx.arc(l.x + w, l.y + h, 10, 0, Math.PI*2); ctx.fill();
            }
        });
    }

    function renderSticker(img, x, y, size) {
        ctx.drawImage(img, x - size/2, y - size/2, size, size);
    }

    let isDragging = false;
    const getPos = (e) => { const r = canvas.getBoundingClientRect(); return { x: (e.clientX-r.left)*(canvas.width/r.width), y: (e.clientY-r.top)*(canvas.height/r.height) }; };

    canvas.addEventListener('touchstart', (e) => {
        const p = getPos(e.touches[0]); let found = null;
        textLayers.forEach(l => { 
            const w = 100 * l.scale, h = 50 * l.scale;
            if(Math.abs(p.x-l.x) < w && Math.abs(p.y-l.y) < h) found = l;
        });
        if(found) { selectedLayer = found; isDragging = true; }
        else if(mainImg.src) { selectedLayer = null; addPoint(p); }
        else imgInput.click();
        draw();
    });

    canvas.addEventListener('touchmove', (e) => {
        if(isDragging && selectedLayer) {
            const p = getPos(e.touches[0]);
            selectedLayer.x = p.x; selectedLayer.y = p.y; draw();
        }
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => isDragging = false);

    function addPoint(p) {
        const r = { x: p.x, y: p.y, img: preRenderedSticker, size: parseInt(document.getElementById('sizeSlider').value) };
        if(records.length === 0) records.push([r]); else records[records.length-1].push(r);
    }

    // 控件交互
    document.getElementById('sizeSlider').oninput = function() { 
        document.getElementById('sizeVal').innerText = this.value;
        if(selectedLayer) { selectedLayer.dotSize = this.value/6; draw(); }
    };
    document.getElementById('textScaleSlider').oninput = function() {
        document.getElementById('textScaleVal').innerText = (this.value/10).toFixed(1);
        if(selectedLayer) { selectedLayer.scale = this.value/10; draw(); }
    };
    document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 180, color: currentColor });
    colorPicker.on('color:change', (c) => { currentColor = c.hexString; document.getElementById('colorBtn').style.backgroundColor = currentColor; updatePreRender(); });
    function closePicker() { document.getElementById('pickerContainer').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function smartUndo() { if(selectedLayer) { textLayers = textLayers.filter(l=>l!==selectedLayer); selectedLayer=null; } else records.pop(); draw(); }
    function clearAll() { records = []; textLayers = []; draw(); }
    function download() { const link = document.createElement('a'); link.download = 'art.png'; link.href = canvas.toDataURL(); link.click(); }
    
    imgInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { mainImg.onload = () => { canvas.width = mainImg.width; canvas.height = mainImg.height; draw(); }; mainImg.src = f.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };
    init();
</script>
</body>
</html>
