<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Pancake Sticker Book - pancakedeco</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; --spine-pink: #f8a5bc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 15px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #ffeef4; }
        .title-header { font-size: 24px; color: #fff; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 0px var(--pink-accent); text-align: center; }
        .book-container { width: 94%; max-width: 420px; background: var(--book-cover); padding: 12px; border-radius: 15px 40px 40px 15px; box-shadow: 0 20px 40px rgba(214,51,132,0.2); position: relative; display: flex; flex-direction: column; margin: 0 auto; }
        .top-page, .bottom-page { background: var(--page-white); padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; box-shadow: inset 1px 1px 10px rgba(0,0,0,0.03); }
        .top-page { border-radius: 12px 25px 0 0; z-index: 2; overflow: hidden; }
        .bottom-page { border-radius: 0 0 25px 12px; min-height: 380px; z-index: 2; }
        .spine-area { height: 30px; background: var(--spine-pink); width: 100%; position: relative; z-index: 5; margin: -5px 0; display: flex; justify-content: space-around; align-items: center; }
        .ring { width: 10px; height: 45px; background: var(--ring-gray); border-radius: 5px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3); }
        .page-corner { position: absolute; top: 0; right: 0; width: 56px; height: 56px; cursor: pointer; z-index: 10; }
        .page-corner::before { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 56px 56px 0; border-color: transparent var(--pink-accent) transparent transparent; filter: drop-shadow(-2px 2px 4px rgba(255,133,162,0.5)); transition: border-width 0.15s; }
        .page-corner:active::before { border-width: 0 66px 66px 0; }
        .page-corner-icon { position: absolute; top: 8px; right: 8px; font-size: 14px; color: white; pointer-events: none; transition: transform 0.3s; }
        .page-corner.flipped .page-corner-icon { transform: rotate(180deg); }
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 5px; justify-items: center; }
        /* FIX2: 贴纸格骨架屏占位 */
        .sticker-slot { width: 58px; height: 58px; border-radius: 10px; border: 2px solid #f0f0f0; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; }
        .sticker-slot.loading { background: linear-gradient(110deg, #ffeef4 30%, #ffd6e4 50%, #ffeef4 70%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .sticker-slot.active { border-color: var(--pink-accent); background: #fffafb; }
        .sticker-item { max-width: 85%; max-height: 85%; object-fit: contain; display: block; margin: 0 auto; opacity: 0; transition: opacity 0.3s; }
        .sticker-item.loaded { opacity: 1; }
        .page-content { width: 100%; }
        .sticker-gen-area { width: 100%; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; margin-bottom: 10px; }
        .gen-row { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; }
        .gen-row input[type=text] { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; outline: none; font-size: 14px; height: 38px; }
        .gen-btn { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; height: 38px; white-space: nowrap; flex-shrink: 0; }
        .img-upload-box { flex: 1; border: 1.5px dashed #ffcad4; border-radius: 8px; padding: 6px 8px; font-size: 12px; color: #ff85a2; cursor: pointer; background: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; height: 38px; overflow: hidden; }
        .img-upload-preview { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 1.5px solid #ffcad4; display: none; flex-shrink: 0; }
        .gen-tip { font-size: 11px; color: #ff85a2; text-align: center; padding: 2px 0; display: none; }
        .slider-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--pink-accent); font-weight: bold; margin-top: 5px; }
        .slider-row span:first-child { min-width: 56px; }
        .slider-row span:last-child { min-width: 30px; text-align: right; }
        input[type=range] { accent-color: var(--pink-accent); width: 100%; cursor: pointer; }
        .controls { display: flex; align-items: flex-start; gap: 12px; width: 100%; margin-top: 2px; }
        .color-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 18px; }
        .current-color-dot { width: 48px; height: 48px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .slider-col { flex: 1; }
        .canvas-area { flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; position: relative; background: #fffafb; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 10px; }
        #myCanvas { max-width: 100%; max-height: 100%; touch-action: none; z-index: 6; }
        .plus-icon { font-size: 60px; color: #ffabbd; position: absolute; pointer-events: none; z-index: 1; }
        .canvas-area.has-img .plus-icon { display: none; }
        .bottom-action-bar { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        .bottom-action-bar button { flex: 1; padding: 12px 2px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; background: var(--pink-accent); box-shadow: 0 3px 0 #e66a85; cursor: pointer; }
        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 9999; box-shadow: 0 10px 50px rgba(0,0,0,0.3); width: min(300px, 90vw); max-height: 90vh; overflow-y: auto; }
        .color-preview-bar { width: 100%; height: 34px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.3); font-size: 13px; }
        .swatch-title { font-size: 10px; color: #999; margin: 10px 0 5px; }
        .color-swatches { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-bottom: 5px; min-height: 34px; }
        .swatch { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 2px solid #eee; transition: transform 0.1s; }
        .swatch:active { transform: scale(0.9); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; }
        .live-btn-area { width: 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 8px 10px; background: #fff5f8; border-radius: 10px; border: 1px dashed #ffcad4; }
        .live-preview-icon { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
        .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #ffcad4; }
        .live-dot.lit { background: var(--pink-accent); box-shadow: 0 0 6px var(--pink-accent); }
        .live-label { font-size: 11px; color: var(--pink-accent); font-weight: bold; flex: 1; }
        .live-btn { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 6px 12px; font-weight: bold; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .live-btn:disabled { background: #ffcad4; cursor: not-allowed; }
        /* FIX1: 录制进度条 */
        .record-progress { display:none; width:100%; height:4px; background:#ffd6e0; border-radius:4px; margin-top:4px; }
        .record-progress-bar { height:100%; background:var(--pink-accent); border-radius:4px; transition:width 0.3s; width:0%; }

        /* ── 第3页：马赛克画板 ── */
        #pageContent3 { width: 100%; display: none; }
        .mosaic-board-wrap {
            width: 100%;
            background: #fffafb;
            border-radius: 12px;
            border: 1px dashed #ffcad4;
            padding: 10px;
        }
        #mosaicCanvas {
            display: block;
            width: 100%;
            border-radius: 8px;
            touch-action: none;
            cursor: crosshair;
            border: 1.5px solid #ffcad4;
            background-image:
                linear-gradient(45deg,#f5f5f5 25%,transparent 25%),
                linear-gradient(-45deg,#f5f5f5 25%,transparent 25%),
                linear-gradient(45deg,transparent 75%,#f5f5f5 75%),
                linear-gradient(-45deg,transparent 75%,#f5f5f5 75%);
            background-size: 10px 10px;
            background-position: 0 0,0 5px,5px -5px,-5px 0;
        }
        .mosaic-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mosaic-color-preview {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 6px rgba(255,133,162,.4);
            cursor: pointer;
            flex-shrink: 0;
            background: #FFB7B2;
        }
        .mosaic-tool-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid #ffcad4;
            background: #fff5f8;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all .15s;
        }
        .mosaic-tool-btn.active { background: #ff85a2; border-color: #ff85a2; }
        .mosaic-gen-btn {
            flex: 1;
            min-width: 80px;
            padding: 8px 10px;
            background: var(--pink-accent);
            color: #fff; border: none;
            border-radius: 20px;
            font-weight: bold; font-size: 13px;
            cursor: pointer;
        }
        .mosaic-gen-btn:disabled { background: #ffcad4; cursor: not-allowed; }
        .mosaic-preview-row {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 8px 10px;
            background: #fff0f5;
            border-radius: 10px;
            border: 1.5px solid #ffcad4;
        }
        .mosaic-preview-thumb {
            width: 56px; height: 56px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid #ffcad4;
            flex-shrink: 0;
        }
        .mosaic-use-btn {
            flex: 1;
            padding: 9px 6px;
            background: #ff85a2;
            color: #fff; border: none;
            border-radius: 14px;
            font-weight: bold; font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closePicker();closeRandomModal(null)"></div>
<div class="title-header">pancake sticker book</div>
<div class="book-container">
    <div class="top-page" id="topPage">
        <div class="page-corner" id="pageCorner" onclick="flipPage()">
            <div class="page-corner-icon">▷</div>
        </div>
        <div class="sticker-grid" id="stickerGrid"></div>
        <div class="page-content" id="pageContent1">

                    <input type="checkbox" id="useOriginalColor"><label for="useOriginalColor">使用Emoji本身颜色</label>
                </div>
                <div class="gen-row">

                <div class="gen-tip" id="genTip1">生成中...</div>

                <div class="slider-row"><span>钻石密度</span><span id="densityVal">少</span></div>
                <input type="range" id="densitySlider" min="6" max="12" value="6" step="2" oninput="updateDensityLabel(this.value)">
            </div>
        </div>
        <div class="page-content" id="pageContent2" style="display:none">
            <div class="sticker-gen-area">
                <div style="font-size:12px;color:var(--pink-accent);font-weight:bold;margin-bottom:6px;">上传图片生成贴纸</div>
                <div class="gen-row">
                    <div class="img-upload-box" onclick="stickerImgInput.click()">

                <input type="file" id="stickerImgInput" accept="image/*" style="display:none">
            </div>
        </div>
        <div id="pageContent3" style="display:none">
            <div class="mosaic-board-wrap">
                <canvas id="mosaicCanvas"></canvas>
                <div class="mosaic-toolbar">
                    <div class="mosaic-color-preview" id="mosaicColorDot" onclick="document.getElementById('colorBtn').click()" title="选色"></div>
                    <button class="mosaic-tool-btn" id="mosaicBucketBtn" onclick="mosaicSetMode('bucket')" title="油漆桶">🪣</button>

                    <button class="mosaic-tool-btn" id="mosaicEraserBtn" onclick="mosaicSetMode('eraser')" title="橡皮">🧹</button>
                    <button class="mosaic-tool-btn" onclick="mosaicClear()" title="清空">🗑️</button>
                    <button class="mosaic-gen-btn" id="mosaicGenBtn" onclick="mosaicGenerate()">✨ 生成贴纸</button>
                </div>
                <div class="mosaic-preview-row" id="mosaicPreviewRow">
                    <img class="mosaic-preview-thumb" id="mosaicThumb" alt="">
                    <div style="flex:1">
                        <div style="font-size:11px;color:#ff85a2;margin-bottom:6px;">马赛克贴纸生成完成 🎀</div>

                    </div>
                </div>
            </div>
        </div>
        <div class="controls" id="mainControls">

            <div class="slider-col">
                <div class="slider-row"><span>钻石大小（联动贴纸中钻石大小）</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="500" value="80">
                <div class="slider-row"><span>钻石角度</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotateSlider" min="0" max="360" value="0">
            </div>

    </div>
    <div class="spine-area">
        <script>for(let i=0;i<6;i++)document.write('<div class="ring"></div>');</script>
    </div>
    <div class="bottom-page">
        <div class="live-btn-area">
            <div class="live-preview-icon" id="livePreviewIcon">
                <div class="live-dot lit" id="liveDot0"></div>
                <div class="live-dot" id="liveDot1"></div>
                <div class="live-dot" id="liveDot2"></div>
                <div class="live-dot" id="liveDot3"></div>
                <div class="live-dot" id="liveDot4"></div>
            </div>

            <button class="live-btn" id="liveBtn" onclick="generateLiveVideo()">生成</button>

</div>

    <div id="iroPicker" style="display:flex;justify-content:center;"></div>
    <div class="swatch-title">正在使用</div>
    <div style="height:34px;width:34px;border-radius:8px;border:2px solid var(--pink-accent);" id="currentSwatch"></div>

</div>

                    let[h,s,l]=rgbToHsl(raw[idx],raw[idx+1],raw[idx+2]);

// ============================================================
//  图片生成水钻
// ============================================================
function generateImgStickers(){
    if(!mainImg.src)return imgInput.click();
    if(!stickerUploadedImg){alert('请先上传图片');return;}
    const tip=document.getElementById('genTip2'); tip.style.display='block';
    setTimeout(()=>{ _buildImgLayer(); tip.style.display='none'; },20);
}
function _buildImgLayer(){
    const step=_stepFromDensity('densitySlider2');
    const MAX=160;
    const iw=stickerUploadedImg.naturalWidth, ih=stickerUploadedImg.naturalHeight;
    const sc=Math.min(MAX/iw,MAX/ih,1);
    const sw=Math.max(1,Math.round(iw*sc)), sh=Math.max(1,Math.round(ih*sc));
    const tc=document.createElement('canvas'); tc.width=sw; tc.height=sh;
    tc.getContext('2d').drawImage(stickerUploadedImg,0,0,sw,sh);
    const raw=tc.getContext('2d').getImageData(0,0,sw,sh).data;
    function q(v){return Math.round(v/16)*16;}
    const points=[];
    for(let y=0;y<sh;y+=step){
        for(let x=0;x<sw;x+=step){
            const idx=(y*sw+x)*4;
            if(raw[idx+3]>80){
                let[h,s,l]=rgbToHsl(q(raw[idx]),q(raw[idx+1]),q(raw[idx+2]));
                s=Math.min(1,s*1.8); l=Math.min(0.82,Math.max(0.28,l));
                points.push({dx:x-sw/2, dy:y-sh/2, color:hslToRgb(h,s,l)});
            }
        }
    }
    if(!points.length)return;
    const dotSize=parseInt(document.getElementById('sizeSlider').value);
    const layer={
        points, colorCacheMap:{},
        defaultImg:preRenderedSticker,
        x:canvas.width/2, y:canvas.height/2,
        scale:parseInt(document.getElementById('textScaleSlider2').value)/10,
        ratio:stickerRatio, origWidth:sw, origHeight:sh,
        dotSize, rotation:0,
        stickerIdx:curIdx,
        useOrig:true,
    };
    _buildCache(layer);
    textLayers.push(layer);
    selectedLayer=layer;
    draw();
}
// ============================================================
//  缓存构建
// ============================================================
function _stepFromDensity(sliderId){
    const v=parseInt(document.getElementById(sliderId).value);
    return v===6?5:v===8?4:v===10?3:2;
}
function _buildCache(l){
    const sImg=stickers[l.stickerIdx||curIdx];
    if(!sImg||!sImg.complete||!sImg.naturalWidth)return;
    const linked=l.dotSize/6;
    const dw=Math.max(1,linked*(l.ratio>=1?1:l.ratio));
    const dh=Math.max(1,linked/(l.ratio>=1?l.ratio:1));
    const newCache={};
    const uniqueColors=[...new Set(l.points.map(p=>p.color).filter(Boolean))];
    uniqueColors.forEach(col=>{
        newCache[col]=canvasToImg(makeColoredSticker(sImg,col,dw,dh));
    });
    l.colorCacheMap=newCache;
    l.defaultImg=canvasToImg(makeColoredSticker(sImg,currentColor,dw,dh));
}

function draw(isExporting){
    mainCtx.clearRect(0,0,canvas.width,canvas.height);
    if(mainImg.src)mainCtx.drawImage(mainImg,0,0,canvas.width,canvas.height);
    records.flat().forEach(r=>{
        mainCtx.save();
        mainCtx.translate(r.x,r.y); mainCtx.rotate(r.angle||0);
        if(r.glowing&&!isExporting){mainCtx.shadowColor=r.glowColor||'#ffddee';mainCtx.shadowBlur=22;}
        mainCtx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
        mainCtx.shadowBlur=0;
        mainCtx.restore();
    });
    textLayers.forEach(l=>{
        const linked=l.dotSize/6;
        const dw=Math.max(1,linked*(l.ratio>=1?1:l.ratio));
        const dh=Math.max(1,linked/(l.ratio>=1?l.ratio:1));
        mainCtx.save();
        mainCtx.translate(l.x,l.y); mainCtx.rotate(l.rotation||0);
        l.points.forEach(p=>{
            const img=p.color?(l.colorCacheMap[p.color]||l.defaultImg):l.defaultImg;
            if(img)mainCtx.drawImage(img,p.dx*l.scale-dw/2,p.dy*l.scale-dh/2,dw,dh);
        });
        // FIX3: 选中框 + 更大的旋转按钮
        if(l===selectedLayer&&!isExporting){
            const bw=(l.origWidth/2)*l.scale*0.55;
            const bh=(l.origHeight/2)*l.scale*0.55;
            mainCtx.strokeStyle="#ff85a2"; mainCtx.lineWidth=3; mainCtx.setLineDash([5,4]);
            mainCtx.strokeRect(-bw,-bh,bw*2,bh*2);
            mainCtx.setLineDash([]);
            // FIX3: 旋转按钮大幅放大：外白圆r=38，内粉圆r=32，图标28px
            const dotY=bh+46; // 往下移更多，避免遮挡内容
            // 白色外圈
            mainCtx.beginPath(); mainCtx.arc(0,dotY,38,0,Math.PI*2);
            mainCtx.fillStyle="rgba(255,255,255,0.97)"; mainCtx.fill();
            mainCtx.strokeStyle="#ff85a2"; mainCtx.lineWidth=2.5; mainCtx.setLineDash([]);
            mainCtx.stroke();
            // 粉色内圆
            mainCtx.beginPath(); mainCtx.arc(0,dotY,32,0,Math.PI*2);
            mainCtx.fillStyle="#ff85a2"; mainCtx.fill();
            // 旋转图标
            mainCtx.fillStyle='#fff';
            mainCtx.font='bold 28px Arial';
            mainCtx.textAlign='center'; mainCtx.textBaseline='middle';
            mainCtx.fillText('\u21bb',0,dotY+1);
        }
        mainCtx.restore();
    });
}

const getPos=(e)=>{
    const r=canvas.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-r.left)*(canvas.width/r.width), y:(cy-r.top)*(canvas.height/r.height)};
};
function hitLayer(px,py,l){
    const dx=px-l.x, dy=py-l.y;
    const rot=-(l.rotation||0);
    const lx=dx*Math.cos(rot)-dy*Math.sin(rot);
    const ly=dx*Math.sin(rot)+dy*Math.cos(rot);
    return Math.abs(lx)<=(l.origWidth/2)*l.scale*0.92 && Math.abs(ly)<=(l.origHeight/2)*l.scale*0.92;
}
// FIX3: 碰撞半径扩大到52（视觉圆半径32+20余量），让手指更容易点中
function hitRotateDot(px,py,l){
    const rot=l.rotation||0;
    const bh=(l.origHeight/2)*l.scale*0.55+46;
    const dotX=l.x+(-Math.sin(rot))*bh;
    const dotY=l.y+(Math.cos(rot))*bh;
    return Math.hypot(px-dotX,py-dotY)<52;
}
canvas.addEventListener('touchstart',(e)=>{
    if(!mainImg.src)return;
    const p=getPos(e);
    if(selectedLayer&&hitRotateDot(p.x,p.y,selectedLayer)){
        isRotatingLayer=true;
        layerCenter={x:selectedLayer.x, y:selectedLayer.y};
        rotStart.touchAngle=Math.atan2(p.y-layerCenter.y,p.x-layerCenter.x);
        rotStart.layerAngle=selectedLayer.rotation||0;
        return;
    }
    let found=null;
    for(let i=textLayers.length-1;i>=0;i--){
        if(hitLayer(p.x,p.y,textLayers[i])){found=textLayers[i];break;}
    }
    if(found){
        selectedLayer=found; isDraggingLayer=true;
        document.getElementById('sizeSlider').value=found.dotSize;
        document.getElementById('sizeVal').innerText=found.dotSize;
        draw(); return;
    }
    selectedLayer=null;
    const size=parseInt(document.getElementById('sizeSlider').value);
    const angle=parseInt(document.getElementById('rotateSlider').value)*Math.PI/180;
    const sW=size*(stickerRatio>=1?1:stickerRatio);
    const sH=size/(stickerRatio>=1?stickerRatio:1);
    const rec={x:p.x,y:p.y,img:preRenderedSticker,sizeW:sW,sizeH:sH,angle,glowing:true,glowColor:currentColor};
    records.push([rec]);
    draw();
    setTimeout(()=>{rec.glowing=false;draw();},600);
},{passive:true});
canvas.addEventListener('touchmove',(e)=>{
    const p=getPos(e);
    if(isRotatingLayer&&selectedLayer){
        const curA=Math.atan2(p.y-layerCenter.y,p.x-layerCenter.x);
        selectedLayer.rotation=rotStart.layerAngle+(curA-rotStart.touchAngle);
        draw();
    }else if(isDraggingLayer&&selectedLayer){
        selectedLayer.x=p.x; selectedLayer.y=p.y; draw();
    }
    e.preventDefault();
},{passive:false});

// ============================================================
//  FIX1: 高清视频生成
//  策略：离屏canvas用原图2倍尺寸渲染 → MediaRecorder高码率录制
//  码率 20Mbps，帧间隔400ms，额外首尾各2帧稳定画面
//  不支持MediaRecorder时降级为逐帧PNG下载
// ============================================================
function generateLiveVideo(){
    if(!mainImg.src){alert('请先上传图片');return;}
    const allRecords=records.flat();
    if(allRecords.length===0){alert('请先在画布上放置贴纸');return;}
    const btn=document.getElementById('liveBtn');
    const progressWrap=document.getElementById('recordProgress');
    const progressBar=document.getElementById('recordProgressBar');
    // 检测支持格式，优先 webm（兼容性最好），mp4 在 iOS Safari 支持
    const mimeType = (() => {
        const types=[
            'video/webm;codecs=vp9',
            'video/webm;codecs=vp8',
            'video/webm',
            'video/mp4;codecs=avc1',
            'video/mp4',
        ];
        if(typeof MediaRecorder==='undefined') return null;
        if(!MediaRecorder.isTypeSupported) return null;
        return types.find(m=>{ try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;} })||null;
    })();
    if(!mimeType){
        _doLivePngSequence(allRecords,btn); return;
    }
    btn.disabled=true; btn.textContent='录制中...';
    progressWrap.style.display='block'; progressBar.style.width='0%';
    // 离屏canvas — 确保有正确尺寸
    const srcW = canvas.width  || 800;
    const srcH = canvas.height || 800;
    const SCALE = window.devicePixelRatio >= 2 ? 1 : 2; // 高清屏不需要再放大
    const rc=document.createElement('canvas');
    rc.width=srcW*SCALE; rc.height=srcH*SCALE;
    const rx=rc.getContext('2d');
    rx.scale(SCALE,SCALE);
    const FRAME_INTERVAL=400;
    const frameCount=Math.min(allRecords.length,30);
    const totalFrames=frameCount+4;
    function drawLiveFrame(glowIdx){
        rx.clearRect(0,0,srcW,srcH);
        if(mainImg.src) rx.drawImage(mainImg,0,0,srcW,srcH);
        textLayers.forEach(l=>{
            const linked=l.dotSize/6;
            const dw=Math.max(1,linked*(l.ratio>=1?1:l.ratio));
            const dh=Math.max(1,linked/(l.ratio>=1?l.ratio:1));
            rx.save(); rx.translate(l.x,l.y); rx.rotate(l.rotation||0);
            l.points.forEach(p=>{
                const img=p.color?(l.colorCacheMap[p.color]||l.defaultImg):l.defaultImg;
                if(img) rx.drawImage(img,p.dx*l.scale-dw/2,p.dy*l.scale-dh/2,dw,dh);
            });
            rx.restore();
        });
        allRecords.forEach((r,ri)=>{
            if(!r.img) return;
            rx.save(); rx.translate(r.x,r.y); rx.rotate(r.angle||0);
            if(ri===glowIdx){
                rx.shadowOffsetX=0; rx.shadowOffsetY=0;
                rx.shadowColor=r.glowColor||'#ffe0ee';
                rx.shadowBlur=36;
                rx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
                rx.shadowBlur=16;
                rx.shadowColor='#ffffff';
                rx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
                rx.shadowBlur=0;
            } else {
                rx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
            }
            rx.restore();
        });
    }
    drawLiveFrame(-1);
    let stream;
    try { stream=rc.captureStream(0); } catch(e){ _doLivePngSequence(allRecords,btn); return; }
    const chunks=[];
    let recorder;
    try {
        recorder=new MediaRecorder(stream,{ mimeType, videoBitsPerSecond: 8000000 });
    } catch(e){
        _doLivePngSequence(allRecords,btn); return;
    }
    recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
    recorder.onstop=()=>{
        if(chunks.length===0){ btn.disabled=false; btn.textContent='生成'; progressWrap.style.display='none'; alert('录制失败，请重试'); return; }
        const ext=mimeType.includes('mp4')?'mp4':'webm';
        const blob=new Blob(chunks,{type:mimeType});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        const now=new Date();
        const ts=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
        a.download=`pancakesticker_live_${ts}.${ext}`;
        a.href=url; a.click();
        URL.revokeObjectURL(url);
        btn.disabled=false; btn.textContent='生成';
        progressWrap.style.display='none';
    };
    recorder.onerror=()=>{ btn.disabled=false; btn.textContent='生成'; progressWrap.style.display='none'; alert('录制出错，请重试'); };
    try { recorder.start(); } catch(e){ _doLivePngSequence(allRecords,btn); return; }
    let fi=0;
    const timer=setInterval(()=>{
        const glowIdx=(fi<2||fi>=totalFrames-2)?-1:(fi-2);
        drawLiveFrame(glowIdx);
        try{ if(stream.getTracks()[0].requestFrame) stream.getTracks()[0].requestFrame(); }catch(e){}
        fi++;
        progressBar.style.width=(fi/totalFrames*100)+'%';
        if(fi>=totalFrames){
            clearInterval(timer);
            setTimeout(()=>{ try{recorder.stop();}catch(e){} },400);
        }
    }, FRAME_INTERVAL);
}
// 降级方案：逐帧下载PNG
function _doLivePngSequence(allRecords,btn){
    btn.disabled=true; btn.textContent='生成中...';
    const frameCount=Math.min(allRecords.length,12);
    let fi=0;
    function nextFrame(){
        if(fi>=frameCount){ btn.disabled=false; btn.textContent='生成'; return; }
        const fc=document.createElement('canvas');
        fc.width=canvas.width; fc.height=canvas.height;
        const fx=fc.getContext('2d');

        textLayers.forEach(l=>{
            const linked=l.dotSize/6;
            const dw=Math.max(1,linked*(l.ratio>=1?1:l.ratio));
            const dh=Math.max(1,linked/(l.ratio>=1?l.ratio:1));
            fx.save(); fx.translate(l.x,l.y); fx.rotate(l.rotation||0);
            l.points.forEach(p=>{
                const img=p.color?(l.colorCacheMap[p.color]||l.defaultImg):l.defaultImg;
                if(img) fx.drawImage(img,p.dx*l.scale-dw/2,p.dy*l.scale-dh/2,dw,dh);
            });
            fx.restore();
        });
        allRecords.forEach((r,ri)=>{
            fx.save(); fx.translate(r.x,r.y); fx.rotate(r.angle||0);
            if(ri===fi){
                fx.shadowColor=r.glowColor||'#ffe0ee'; fx.shadowBlur=40;
                fx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
                fx.shadowColor='#ffffff'; fx.shadowBlur=18;
            }
            fx.drawImage(r.img,-r.sizeW/2,-r.sizeH/2,r.sizeW,r.sizeH);
            fx.shadowBlur=0; fx.restore();
        });
        const a=document.createElement('a');
        a.download=`pancakesticker_live_frame${String(fi+1).padStart(2,'0')}.png`;
        a.href=fc.toDataURL('image/png'); a.click();
        fi++; setTimeout(nextFrame,400);
    }
    nextFrame();
}

// ============================================================
//  马赛克画板功能
// ============================================================
(function(){
    const COLS = 20, ROWS = 20;  // 格子数
    const CANVAS_PX = 320;       // 内部分辨率
    const CELL = CANVAS_PX / COLS;
    const CELL_OUT = 48;         // 生成贴纸每格像素

    const mc   = document.getElementById('mosaicCanvas');
    const mctx = mc.getContext('2d');
    mc.width = mc.height = CANVAS_PX;

    const grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
    let mMode  = 'pen';   // 'pen' | 'bucket' | 'eraser'
    let mDown  = false;
    let mLastDataUrl = null;

    // 绘制所有格子
    function mRedrawAll(){
        mctx.clearRect(0, 0, CANVAS_PX, CANVAS_PX);
        for(let r=0; r<ROWS; r++)
            for(let c=0; c<COLS; c++)
                mDrawCell(r, c);
    }
    function mDrawCell(r, c){
        const x=c*CELL, y=r*CELL;
        if(grid[r][c]){
            mctx.fillStyle = grid[r][c];
            mctx.fillRect(x, y, CELL, CELL);
        } else {
            mctx.clearRect(x, y, CELL, CELL);
        }
        mctx.strokeStyle = 'rgba(255,133,162,0.15)';
        mctx.lineWidth = 0.5;
        mctx.strokeRect(x+.5, y+.5, CELL-1, CELL-1);
    }
    mRedrawAll();

    // 坐标换算
    function mGetCell(clientX, clientY){
        const rect = mc.getBoundingClientRect();
        const col = Math.floor((clientX - rect.left) / rect.width  * COLS);
        const row = Math.floor((clientY - rect.top)  / rect.height * ROWS);
        return {row, col};
    }

    // 油漆桶 flood fill（BFS）
    function mFloodFill(startR, startC, fillColor){
        const targetColor = grid[startR][startC];
        if(targetColor === fillColor) return;
        const q = [[startR, startC]];
        const visited = Array.from({length:ROWS}, ()=>Array(COLS).fill(false));
        visited[startR][startC] = true;
        while(q.length){
            const [r,c] = q.shift();
            grid[r][c] = fillColor;
            mDrawCell(r, c);
            [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
                if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]&&grid[nr][nc]===targetColor){
                    visited[nr][nc]=true;
                    q.push([nr,nc]);
                }
            });
        }
    }

    // 点击/涂色处理
    function mAct(clientX, clientY){
        const {row, col} = mGetCell(clientX, clientY);
        if(row<0||row>=ROWS||col<0||col>=COLS) return;
        if(mMode === 'bucket'){
            mFloodFill(row, col, currentColor);
        } else if(mMode === 'eraser'){
            if(grid[row][col] !== null){ grid[row][col]=null; mDrawCell(row,col); }
        } else {
            // pen
            if(grid[row][col] !== currentColor){ grid[row][col]=currentColor; mDrawCell(row,col); }
        }
    }

    mc.addEventListener('mousedown', e=>{ mDown=true; mAct(e.clientX,e.clientY); });
    mc.addEventListener('mousemove', e=>{ if(mDown&&mMode!=='bucket') mAct(e.clientX,e.clientY); });
    window.addEventListener('mouseup', ()=>mDown=false);
    mc.addEventListener('touchstart', e=>{ e.preventDefault(); mAct(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
    mc.addEventListener('touchmove',  e=>{ e.preventDefault(); if(mMode!=='bucket') mAct(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});

    // 工具切换
    window.mosaicSetMode = function(mode){
        mMode = mode;
        document.getElementById('mosaicBucketBtn').classList.toggle('active', mode==='bucket');
        document.getElementById('mosaicPenBtn').classList.toggle('active',    mode==='pen');
        document.getElementById('mosaicEraserBtn').classList.toggle('active', mode==='eraser');
        mc.style.cursor = mode==='eraser'?'cell':mode==='bucket'?'copy':'crosshair';
    };
    mosaicSetMode('pen'); // 默认画笔

    // 清空
    window.mosaicClear = function(){
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c]=null;
        mRedrawAll();
        document.getElementById('mosaicPreviewRow').style.display='none';
    };

    // 生成贴纸 → 直接放到主画布
    window.mosaicGenerate = function(){
        const hasContent = grid.some(row=>row.some(c=>c!==null));
        if(!hasContent){ alert('请先涂色再生成 🎨'); return; }
        const btn = document.getElementById('mosaicGenBtn');
        btn.disabled=true; btn.textContent='生成中…';

        const out = document.createElement('canvas');
        out.width = COLS * CELL_OUT;
        out.height = ROWS * CELL_OUT;
        const octx = out.getContext('2d');
        const sImg = stickers[curIdx];

        for(let r=0;r<ROWS;r++){
            for(let c=0;c<COLS;c++){
                if(!grid[r][c]) continue;
                const x=c*CELL_OUT, y=r*CELL_OUT;
                if(sImg&&sImg.complete&&sImg.naturalWidth){
                    octx.globalCompositeOperation='source-over';
                    octx.drawImage(sImg, x, y, CELL_OUT, CELL_OUT);
                    octx.globalCompositeOperation='multiply';
                    octx.fillStyle=grid[r][c];
                    octx.fillRect(x, y, CELL_OUT, CELL_OUT);
                    octx.globalCompositeOperation='destination-in';
                    octx.drawImage(sImg, x, y, CELL_OUT, CELL_OUT);
                    octx.globalCompositeOperation='source-over';
                } else {
                    octx.fillStyle=grid[r][c];
                    octx.fillRect(x, y, CELL_OUT, CELL_OUT);
                }
            }
        }

        const dataUrl = out.toDataURL('image/png');
        // 显示预览缩略图
        document.getElementById('mosaicThumb').src = dataUrl;
        document.getElementById('mosaicPreviewRow').style.display = 'flex';
        btn.disabled=false; btn.textContent='✨ 生成贴纸';

        // 直接放到主画布中央
        const mainCanvas = document.getElementById('myCanvas');
        const img = new Image();
        img.onload = function(){
            // 画布没有底图时给个默认尺寸
            if(!mainCanvas.width || mainCanvas.width < 10){
                mainCanvas.width  = 800;
                mainCanvas.height = 800;
                document.getElementById('dropZone').classList.add('has-img');
            }
            const sz = parseInt(document.getElementById('sizeSlider').value) * 3;
            const ratio = img.naturalWidth / img.naturalHeight;
            const sW = sz * (ratio>=1 ? 1 : ratio);
            const sH = sz / (ratio>=1 ? ratio : 1);
            const rec = {
                x: mainCanvas.width/2,
                y: mainCanvas.height/2,
                img, sizeW:sW, sizeH:sH,
                angle: 0,
                glowing:true, glowColor:'#ff85a2'
            };
            records.push([rec]);
            draw();
            setTimeout(()=>{ rec.glowing=false; draw(); }, 800);
        };
        img.src = dataUrl;
    };

    // 保留 use 按钮兼容（现在生成时已自动放置，按钮可再次触发）
    window.mosaicUseSticker = function(){
        const thumb = document.getElementById('mosaicThumb');
        if(!thumb.src) return;
        const mainCanvas = document.getElementById('myCanvas');
        const img = new Image();
        img.onload = function(){
            if(!mainCanvas.width || mainCanvas.width < 10){
                mainCanvas.width = 800; mainCanvas.height = 800;
                document.getElementById('dropZone').classList.add('has-img');
            }
            const sz = parseInt(document.getElementById('sizeSlider').value) * 3;
            const ratio = img.naturalWidth / img.naturalHeight;
            const sW = sz*(ratio>=1?1:ratio);
            const sH = sz/(ratio>=1?ratio:1);
            records.push([{
                x:mainCanvas.width/2, y:mainCanvas.height/2,
                img, sizeW:sW, sizeH:sH, angle:0,
                glowing:true, glowColor:'#ff85a2'
            }]);
            draw();
            setTimeout(()=>{ records.flat().slice(-1)[0].glowing=false; draw(); }, 800);
        };
        img.src = thumb.src;
    };
})();


init();
</script>
</body>
</html>
