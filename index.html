<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pancake sticker book</title>
    <style>
        :root { --accent-pink: #ff85a2; --text-color: #d63384; }
        body { 
            font-family: -apple-system, sans-serif; text-align: center; 
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffdef3, #f7bbff);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            margin: 0; padding: 10px; min-height: 100vh; overflow: hidden; 
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .container { 
            max-width: 550px; margin: auto; background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(10px); padding: 15px; border-radius: 25px; 
            display: flex; flex-direction: column; height: 92vh;
        }

        /* 貼紙欄：橫向排列節省空間 */
        .sticker-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 8px; margin: 10px 0; background: rgba(255, 255, 255, 0.4); 
            padding: 10px; border-radius: 15px; 
        }
        .sticker-item { width: 100%; aspect-ratio: 1; border: 2px solid transparent; border-radius: 8px; cursor: pointer; object-fit: contain; background: #fff; }
        .sticker-item.active { border-color: var(--accent-pink); transform: scale(1.1); box-shadow: 0 0 10px var(--accent-pink); }

        /* 畫布視口 */
        .viewport { 
            flex: 1; position: relative; overflow: hidden; 
            background: #fff; border-radius: 15px; border: 2px solid #fff; margin: 10px 0;
            touch-action: none; /* 禁用瀏覽器默認縮放，由代碼接管 */
        }
