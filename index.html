<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ pancake sticker book ✨</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --dark-pink: #d63384;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body { 
            font-family: 'Segoe UI', sans-serif;
            text-align: center; 
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffdef3, #f7bbff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0; 
            padding: 10px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            max-width: 650px; 
            margin: auto; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 30px; 
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.3); 
        }

        /* 顶部上传区 */
        .upload-section {
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            margin-bottom: 15px;
        }

        /* 贴纸网格 */
        .sticker-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin: 15px 0; 
            background: rgba(255, 255, 255, 0.3); 
            padding: 15px; 
            border-radius: 20px; 
            border: 2px solid white;
        }
        
        .sticker-item { 
            width: 100%; 
            aspect-ratio: 1; 
            border: 3px solid transparent; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            object-fit: contain;
            background: white;
        }
        
        .sticker-item.active { 
            border-color: var(--dark-pink); 
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px var(--primary-pink);
        }

        /* 控制区 */
        .controls { 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            margin: 15px 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        
        .control-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin: 12px 0; 
            font-size: 15px; 
            color: var(--dark-pink); 
            font-weight: bold;
        }

        /* 调色盘外观优化 */
        .color-picker-wrapper {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            cursor: pointer;
        }
        
        input[type="color"] {
            position: absolute;
            top: -10px; left: -10px;
            width: 80px; height: 80px;
            cursor: pointer;
            border: none;
        }
        
        /* 滑动条美化 */
        input[type="range"] { 
            width: 55%; 
            accent-color: var(--dark-pink);
            cursor: pointer;
        }

        /* 画布容器：支持放大显示 */
        .canvas-wrapper {
            width: 100%;
            overflow: auto; /* 允许在手机上滚动查看放大的图片 */
            border-radius: 20px;
            background: #fff;
            margin: 15px 0;
            max-height: 500px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #myCanvas { 
            display: block; 
            margin: 0 auto;
            cursor: crosshair;
            transition: transform 0.2s ease; /* 图片缩放时的平滑效果 */
        }
        
        /* 底部按钮 */
        .footer-btns { display: flex; gap: 12px; }
        button { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.2);
        }
        .btn-undo { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #d63384; }
        .btn-save { background: linear-gradient(135deg, #ff4d94 0%, #ff85a2 100%); }
        button:active { transform: scale(0.95); }

    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--dark-pink); margin: 0 0 15px 0;">pancake sticker book</h2>
    
    <div class="upload-section">
        <label style="font-size: 14px; color: #888;">上传底图：</label>
        <input type="file" id="imgInput" accept="image/*">
    </div>

    <div class="sticker-grid" id="stickerGrid"></div>

    <div class="controls">
        <div class="control-row">
            <span>🎨 钻石色彩:</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="color-picker-wrapper">
                    <input type="color" id="colorPicker" value="#00E5FF">
                </div>
                <span id="colorHex" style="font-family: monospace;">#00E5FF</span>
            </div>
        </div>
        <div class="control-row">
            <span>📏 钻石大小:</span>
            <input type="range" id="sizeSlider" min="10" max="800" value="100">
            <span id="sizeVal" style="min-width: 40px;">100</span>
        </div>
        <div class="control-row" style="border-top: 1px dashed #eee; pt: 10px;">
            <span>🔍 画布缩放:</span>
            <input type="range" id="zoomSlider" min="0.5" max="3" step="0.1" value="1">
            <span id="zoomVal">100%</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="myCanvas"></canvas>
    </div>
    
    <div class="footer-btns">
        <button class="btn-undo" onclick="undo()">⬅️ 撤销</button>
        <button class="btn-save" onclick="download()">💾 保存作品</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const stickerGrid = document.getElementById('stickerGrid');
    const zoomSlider = document.getElementById('zoomSlider');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;
    let currentZoom = 1;

    // --- 初始化贴纸 ---
    for(let i=1; i<=6; i++) {
        const img = new Image();
        img.src = `sticker${i}.png`; 
        stickers.push(img);

        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
        imgEl.onclick = function() {
            curIdx = i - 1;
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
        };
        stickerGrid.appendChild(imgEl);
    }

    // --- 上传与画布初始化 ---
    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                resetZoom();
                draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 画布缩放逻辑 ---
    zoomSlider.oninput = function() {
        currentZoom = parseFloat(this.value);
        document.getElementById('zoomVal').innerText = Math.round(currentZoom * 100) + "%";
        canvas.style.transform = `scale(${currentZoom})`;
        canvas.style.transformOrigin = "top center";
    };

    function resetZoom() {
        currentZoom = 1;
        zoomSlider.value = 1;
        document.getElementById('zoomVal').innerText = "100%";
        canvas.style.transform = "scale(1)";
    }

    // --- 点击交互 ---
    canvas.addEventListener('mousedown', (e) => handleInput(e));
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput(e.touches[0]);
    }, {passive: false});

    function handleInput(e) {
        if(!mainImg.src) return;
        
        const rect = canvas.getBoundingClientRect();
        // 这里的关键：点击位置需要根据当前的 CSS scale 进行还原
        const x = (e.clientX - rect.left) / currentZoom * (canvas.width / (rect.width / currentZoom));
        const y = (e.clientY - rect.top) / currentZoom * (canvas.height / (rect.height / currentZoom));
        
        records.push({
            x: x,
            y: y,
            idx: curIdx,
            color: document.getElementById('colorPicker').value,
            size: parseInt(document.getElementById('sizeSlider').value)
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if(!sImg.complete) return;

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = r.size;
            offCanvas.height = r.size;

            offCtx.drawImage(sImg, 0, 0, r.size, r.size);
            offCtx.globalCompositeOperation = "multiply";
            offCtx.fillStyle = r.color;
            offCtx.fillRect(0, 0, r.size, r.size);
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(sImg, 0, 0, r.size, r.size);
            
            ctx.shadowBlur = r.size / 10;
            ctx.shadowColor = r.color;
            ctx.drawImage(offCanvas, r.x - r.size/2, r.y - r.size/2);
            ctx.shadowBlur = 0;
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return;
        const now = new Date();
        const timeStr = now.getTime(); // 使用毫秒戳绝对不会重复
        const link = document.createElement('a');
        link.download = `Diamond_Work_${timeStr}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    document.getElementById('sizeSlider').oninput = function() {
        document.getElementById('sizeVal').innerText = this.value;
    };
    document.getElementById('colorPicker').oninput = function() {
        document.getElementById('colorHex').innerText = this.value.toUpperCase();
        this.parentElement.style.backgroundColor = this.value;
    };
</script>
</body>
</html>
