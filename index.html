<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pancake sticker book</title>
    <style>
        :root {
            --accent-pink: #ff85a2;
            --text-color: #d63384;
        }

        body { 
            font-family: -apple-system, sans-serif;
            text-align: center; 
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffdef3, #f7bbff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0; padding: 10px; min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            max-width: 550px; margin: auto; 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); 
        }

        /* 贴纸展示：修复压缩感 */
        .sticker-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; margin: 15px 0; 
            background: rgba(255, 255, 255, 0.4); 
            padding: 15px; border-radius: 15px; 
        }
        
        .sticker-item { 
            width: 100%; aspect-ratio: 1; 
            border: 3px solid transparent; border-radius: 12px; 
            cursor: pointer; transition: 0.2s; 
            object-fit: contain; /* 确保预览图也不被压缩 */
            background: rgba(255,255,255,0.8);
        }
        
        .sticker-item.active { border-color: var(--accent-pink); background: #fff; transform: scale(1.05); }

        .controls { background: white; padding: 15px; border-radius: 15px; margin: 10px 0; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 14px; color: var(--text-color); font-weight: bold; }
        
        /* 调色盘外观优化 */
        .palette-button {
            width: 45px; height: 45px; 
            border-radius: 50%; 
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        #colorPicker {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            cursor: pointer; border: none;
        }

        .canvas-wrapper { 
            width: 100%; overflow: auto; 
            background: #fff; border-radius: 10px; 
            margin: 15px 0; border: 2px solid #fff;
        }
        #myCanvas { display: block; margin: 0 auto; cursor: crosshair; }
        
        input[type="range"] { width: 55%; accent-color: var(--accent-pink); }
        
        .footer-btns { display: flex; gap: 10px; }
        button { 
            flex: 1; padding: 15px; border: none; border-radius: 12px; 
            color: white; font-weight: bold; cursor: pointer; font-size: 15px; 
        }
        .btn-undo { background: #ff7875; }
        .btn-save { background: var(--accent-pink); }
    </style>
</head>
<body>

<div class="container">
    <div style="padding-bottom:15px;">
        <input type="file" id="imgInput" accept="image/*" style="font-size: 12px;">
    </div>

    <div class="sticker-grid" id="stickerGrid"></div>

    <div class="controls">
        <div class="control-row">
            <span>🎨 调色盘选色:</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="palette-button" id="paletteBtn">
                    <input type="color" id="colorPicker" value="#00E5FF">
                </div>
                <span id="colorHex" style="font-family: monospace;">#00E5FF</span>
            </div>
        </div>
        <div class="control-row">
            <span>📏 钻石大小:</span>
            <input type="range" id="sizeSlider" min="10" max="500" value="70">
            <span id="sizeVal">70</span>
        </div>
        <div class="control-row" style="border-top: 1px solid #f0f0f0; padding-top: 10px;">
            <span>🔍 画面缩放:</span>
            <input type="range" id="zoomSlider" min="0.5" max="2.5" step="0.1" value="1">
            <span id="zoomVal">100%</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="myCanvas"></canvas>
    </div>
    
    <div class="footer-btns">
        <button class="btn-undo" onclick="undo()">撤销上一步</button>
        <button class="btn-save" onclick="download()">保存到手机</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const stickerGrid = document.getElementById('stickerGrid');
    const zoomSlider = document.getElementById('zoomSlider');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;
    let currentZoom = 1;

    // --- 初始化贴纸 ---
    for(let i=1; i<=6; i++) {
        const img = new Image();
        img.src = `sticker${i}.png`; 
        stickers.push(img);

        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
        imgEl.onclick = function() {
            curIdx = i - 1;
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
        };
        stickerGrid.appendChild(imgEl);
    }

    // --- 上传逻辑 ---
    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 缩放逻辑 ---
    zoomSlider.oninput = function() {
        currentZoom = parseFloat(this.value);
        document.getElementById('zoomVal').innerText = Math.round(currentZoom * 100) + "%";
        canvas.style.transform = `scale(${currentZoom})`;
        canvas.style.transformOrigin = "top center";
    };

    // --- 点击交互 ---
    canvas.addEventListener('mousedown', (e) => handleInput(e));
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput(e.touches[0]);
    }, {passive: false});

    function handleInput(e) {
        if(!mainImg.src) return;
        const rect = canvas.getBoundingClientRect();
        // 修正缩放后的点击坐标
        const x = (e.clientX - rect.left) / currentZoom * (canvas.width / (rect.width / currentZoom));
        const y = (e.clientY - rect.top) / currentZoom * (canvas.height / (rect.height / currentZoom));
        
        records.push({
            x: x, y: y,
            idx: curIdx,
            color: document.getElementById('colorPicker').value,
            size: parseInt(document.getElementById('sizeSlider').value)
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if(!sImg.complete) return;

            // 计算等比例缩放后的宽高，防止压缩
            const ratio = sImg.width / sImg.height;
            let drawW, drawH;
            if (ratio > 1) {
                drawW = r.size;
                drawH = r.size / ratio;
            } else {
                drawW = r.size * ratio;
                drawH = r.size;
            }

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = drawW;
            offCanvas.height = drawH;

            // 染色逻辑
            offCtx.drawImage(sImg, 0, 0, drawW, drawH);
            offCtx.globalCompositeOperation = "multiply";
            offCtx.fillStyle = r.color;
            offCtx.fillRect(0, 0, drawW, drawH);
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(sImg, 0, 0, drawW, drawH);
            
            ctx.drawImage(offCanvas, r.x - drawW/2, r.y - drawH/2);
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return;
        const link = document.createElement('a');
        link.download = `pancake_art_${Date.now()}.png`; // 使用时间戳防止重名
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    document.getElementById('sizeSlider').oninput = function() {
        document.getElementById('sizeVal').innerText = this.value;
    };
    document.getElementById('colorPicker').oninput = function() {
        document.getElementById('colorHex').innerText = this.value.toUpperCase();
        document.getElementById('paletteBtn').style.backgroundColor = this.value;
    };
</script>
</body>
</html>
