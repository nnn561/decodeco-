<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钻石贴纸编辑器</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #myCanvas { border: 2px solid #ddd; border-radius: 8px; max-width: 100%; height: auto; margin-top: 15px; background: #fff; cursor: crosshair; }
        .sticker-menu { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .sticker-btn { width: 60px; height: 60px; border: 3px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #fafafa; object-fit: contain; }
        .sticker-btn.active { border-color: #007bff; background: #e7f3ff; }
        .upload-area { margin-bottom: 15px; }
        button.action-btn { padding: 10px 20px; border: none; border-radius: 5px; background: #ff4d4f; color: white; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 钻石贴纸编辑器</h2>
    
    <div class="upload-area">
        <label>第一步：上传照片 </label>
        <input type="file" id="imgInput" accept="image/*">
    </div>

    <div class="sticker-menu">
        <img src="sticker1.png" class="sticker-btn active" onclick="sel(0, this)">
        <img src="sticker2.png" class="sticker-btn" onclick="sel(1, this)">
        <img src="sticker3.png" class="sticker-btn" onclick="sel(2, this)">

    </div>

    <canvas id="myCanvas"></canvas>
    
    <div>
        <button class="action-btn" onclick="undo()">撤销一步</button>
        <button class="action-btn" style="background:#52c41a" onclick="download()">保存图片</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;

    // 预加载贴纸
    ['sticker1.png', 'sticker2.png',        'sticker3.png'].forEach(src => { ...
.forEach(src => {
        let img = new Image();
        img.src = src;
        stickers.push(img);
    });

    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg.src = f.target.result;
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                draw();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function sel(idx, el) {
        curIdx = idx;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    canvas.onclick = (e) => {
        if(!mainImg.src) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        records.push({
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY,
            idx: curIdx
        });
        draw();
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        records.forEach(r => {
            let size = canvas.width * 0.12; // 贴纸大小缩放
            ctx.drawImage(stickers[r.idx], r.x - size/2, r.y - size/2, size, size);
        });
    }

    function undo() { records.pop(); draw(); }
    
    function download() {
        const link = document.createElement('a');
        link.download = 'my_artwork.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
