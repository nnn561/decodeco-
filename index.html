<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Sticker Book v3</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #ffeef4; overflow-x: hidden; }
        
        .cloud { position: fixed; background: #fff; border-radius: 100px; opacity: 0.6; pointer-events: none; z-index: -1; }
        .c1 { width: 120px; height: 45px; top: 15%; animation: moveClouds 30s linear infinite; }
        @keyframes moveClouds { from { left: -200px; } to { left: 100vw; } }

        .title-header { font-size: 24px; color: #fff; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 0px var(--pink-accent); }

        .book-container { 
            width: 98%; max-width: 420px; background: var(--book-cover); 
            padding: 10px; border-radius: 15px 40px 40px 15px; margin: 0 auto;
            box-shadow: 2px 5px 0px rgba(0,0,0,0.05), 5px 10px 15px rgba(0,0,0,0.1), 10px 20px 40px rgba(214, 51, 132, 0.2);
            position: relative; display: flex; flex-direction: column;
        }

        .top-page, .bottom-page { 
            background: var(--page-white); padding: 15px; position: relative; 
            display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 1px 1px 10px rgba(0,0,0,0.03), 1px 2px 5px rgba(0,0,0,0.1);
        }
        .top-page { border-radius: 12px 25px 0 0; border-bottom: 1px solid #f0f0f0; }
        .bottom-page { border-radius: 0 0 25px 12px; flex: 1; min-height: 320px; margin-top: 15px; }

        .notebook-rings { height: 25px; display: flex; justify-content: space-around; padding: 0 20px; z-index: 20; position: relative; margin: -20px 0; }
        .ring { width: 9px; height: 50px; background: var(--ring-gray); border-radius: 5px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2); }

        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; width: 90%; }
        .sticker-item { width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 1.5px solid #f0f0f0; background: #fff; padding: 8px; box-sizing: border-box; }
        .sticker-item.active { border-color: var(--pink-accent); background: #fffafb; }

        .text-to-sticker-area { width: 100%; margin: 5px 0 15px 0; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; box-sizing: border-box; }
        .text-input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .text-input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; outline: none; }
        .text-input-group button { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; }

        .controls { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 10px;}
        .current-color-dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; flex-shrink: 0; }
        .slider-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--pink-accent); }

        /* 調整按鈕區：挪到滑塊下方 */
        .top-action-bar { display: flex; gap: 8px; margin-top: 5px; width: 100%; border-top: 1px solid #f9f9f9; padding-top: 10px;}
        .top-action-bar button { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; background: var(--pink-accent); }

        .canvas-area { flex: 1; position: relative; border: 2px dashed #ffcad4; border-radius: 15px; margin: 10px 0; background: #fffafb; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #myCanvas { max-width: 100%; height: auto; touch-action: none; z-index: 5; cursor: crosshair;}
        .plus-icon { font-size: 50px; color: #ffabbd; position: absolute; pointer-events: none; }
        .canvas-area.has-img .plus-icon { display: none; }

        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 101; width: 260px; box-shadow: 0 10px 50px rgba(0,0,0,0.2); text-align: center;}
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<div class="cloud c1"></div>
<div class="overlay" id="overlay"></div>
<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="sticker-grid" id="stickerGrid"></div>

        <div class="text-to-sticker-area">
            <div class="text-input-group">
                <input type="text" id="stickerTextInput" placeholder="輸入文字/Emoji">
                <button onclick="generateTextStickers()">生成</button>
            </div>
            <div class="slider-item">
                <div class="slider-label"><span>鑽石密度 (更小越密)</span><span id="densityVal">6</span></div>
                <input type="range" id="densitySlider" min="3" max="12" value="6" oninput="document.getElementById('densityVal').innerText=this.value">
            </div>
        </div>
        
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div class="slider-group">
                <div class="slider-item">
                    <div class="slider-label"><span>大小 (Size)</span><span id="sizeVal">80</span></div>
                    <input type="range" id="sizeSlider" min="40" max="500" value="80">
                </div>
                <div class="slider-item">
                    <div class="slider-label"><span>角度 (Angle)</span><span id="rotVal">0°</span></div>
                    <input type="range" id="rotateSlider" min="0" max="360" value="0">
                </div>
            </div>
        </div>

        <div class="top-action-bar">
            <button style="background:#ffabbd" onclick="smartUndo()">撤銷動作</button>
            <button style="background:#ffccbb" onclick="generateRandomDiamonds()">隨機鑽石</button>
            <button onclick="download()">保存手帳</button>
        </div>
    </div>

    <div class="notebook-rings">
        <script>for(let i=0; i<6; i++) document.write('<div class="ring"></div>');</script>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker" style="margin: 0 auto;"></div>
    <button onclick="closePicker()" style="margin-top:15px; background:var(--pink-accent); width:100%; color:white; border:none; padding:10px; border-radius:10px;">完成</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('imgInput'), dropZone = document.getElementById('dropZone');
    let mainImg = new Image(), stickers = [], records = [], textLayers = [], curIdx = 0;
    let currentColor = "#FFB7B2", preRenderedSticker = null, selectedLayer = null;

    async function init() {
        for(let i=1; i<=6; i++) {
            const img = new Image(); img.src = `sticker${i}.png`; stickers.push(img);
            const imgEl = document.createElement('img'); imgEl.src = img.src; imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
            imgEl.onclick = () => { curIdx = i-1; document.querySelectorAll('.sticker-item').forEach(el=>el.classList.remove('active')); imgEl.classList.add('active'); updatePreRender(); };
            document.getElementById('stickerGrid').appendChild(imgEl);
        }
        updatePreRender();
    }

    function updatePreRender() {
        const sImg = stickers[curIdx]; if (!sImg.complete) return;
        const size = 200, ratio = sImg.width / sImg.height;
        const oc = document.createElement('canvas'), ox = oc.getContext('2d');
        oc.width = ratio > 1 ? size : size * ratio; oc.height = ratio > 1 ? size / ratio : size;
        ox.drawImage(sImg, 0, 0, oc.width, oc.height);
        ox.globalCompositeOperation = "multiply"; ox.fillStyle = currentColor; ox.fillRect(0, 0, oc.width, oc.height);
        ox.globalCompositeOperation = "destination-in"; ox.drawImage(sImg, 0, 0, oc.width, oc.height);
        preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
        if(selectedLayer) { selectedLayer.img = preRenderedSticker; draw(); }
    }

    function generateTextStickers() {
        if (!mainImg.src) return alert("請先上傳底圖");
        const text = document.getElementById('stickerTextInput').value; if (!text) return;
        const fontSize = 50, tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        tempCanvas.width = text.length * fontSize + 40; tempCanvas.height = fontSize + 40;
        tempCtx.font = `bold ${fontSize}px Arial`; tempCtx.textBaseline = 'middle'; tempCtx.textAlign = 'center';
        tempCtx.fillStyle = 'black'; tempCtx.fillText(text, tempCanvas.width/2, tempCanvas.height/2);
        const imgData = tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height).data;
        const step = parseInt(document.getElementById('densitySlider').value), points = [];
        for (let y=0; y<tempCanvas.height; y+=step) {
            for (let x=0; x<tempCanvas.width; x+=step) {
                if (imgData[(y*tempCanvas.width+x)*4 + 3] > 128) points.push({ dx: x - tempCanvas.width/2, dy: y - tempCanvas.height/2 });
            }
        }
        if(points.length > 0) {
            const sizeVal = parseInt(document.getElementById('sizeSlider').value);
            const layer = { points, x: canvas.width/2, y: canvas.height/2, scale: sizeVal/25, img: preRenderedSticker, dotSize: sizeVal/6 };
            textLayers.push(layer); selectedLayer = layer; draw(); document.getElementById('stickerTextInput').value = '';
        }
    }

    dropZone.onclick = () => { if (!mainImg.src) imgInput.click(); };
    imgInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { mainImg = new Image(); mainImg.onload = () => { canvas.width = mainImg.width; canvas.height = mainImg.height; dropZone.classList.add('has-img'); draw(); }; mainImg.src = f.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); if(mainImg.src) ctx.drawImage(mainImg,0,0);
        records.flat().forEach(r => renderSticker(r.img, r.x, r.y, r.size, r.angle));
        textLayers.forEach(layer => {
            if(layer === selectedLayer) { ctx.strokeStyle="rgba(255,133,162,0.4)"; ctx.setLineDash([5,5]); ctx.strokeRect(layer.x-layer.scale*25, layer.y-layer.scale*10, layer.scale*50, layer.scale*20); ctx.setLineDash([]); }
            layer.points.forEach(p => renderSticker(layer.img, layer.x + p.dx * layer.scale, layer.y + p.dy * layer.scale, layer.dotSize, 0));
        });
    }

    function renderSticker(img, x, y, size, angle) {
        const ratio = img.width/img.height; let dw = ratio>1?size:size*ratio, dh = ratio>1?size/ratio:size;
        ctx.save(); ctx.translate(x,y); ctx.rotate(angle); ctx.drawImage(img, -dw/2, -dh/2, dw, dh); ctx.restore();
    }

    let isDrawing = false, isDragging = false;
    const getPos = (e) => { const r = canvas.getBoundingClientRect(); return { x: (e.clientX-r.left)*(canvas.width/r.width), y: (e.clientY-r.top)*(canvas.height/r.height) }; };
    
    canvas.addEventListener('touchstart', (e) => {
        const p = getPos(e.touches[0]); let found = null;
        // 優先檢測點擊的是否是文字圖層
        for(let i=textLayers.length-1; i>=0; i--) {
            const l = textLayers[i];
            if(Math.abs(p.x-l.x) < l.scale*30 && Math.abs(p.y-l.y) < l.scale*15) { found = l; break; }
        }
        if(found) { selectedLayer = found; isDragging = true; } 
        else { selectedLayer = null; isDrawing = true; addPoint(p); }
        draw();
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        const p = getPos(e.touches[0]);
        if(isDragging && selectedLayer) { selectedLayer.x = p.x; selectedLayer.y = p.y; draw(); }
        else if(isDrawing) { addPoint(p); draw(); }
        e.preventDefault();
    }, {passive: false});

    canvas.addEventListener('touchend', () => { isDrawing = isDragging = false; });

    function addPoint(p) {
        const r = { x: p.x, y: p.y, img: preRenderedSticker, size: parseInt(document.getElementById('sizeSlider').value), angle: (parseInt(document.getElementById('rotateSlider').value)*Math.PI)/180 };
        if(records.length === 0 || Date.now() - records[records.length-1][0].time > 500) records.push([r]);
        else records[records.length-1].push(r);
    }

    // 縮放連動邏輯
    document.getElementById('sizeSlider').oninput = function() { 
        const val = this.value; document.getElementById('sizeVal').innerText = val; 
        if(selectedLayer) { 
            selectedLayer.dotSize = val/6; 
            selectedLayer.scale = val/25; // 選中時同步調整文字整體大小
            draw(); 
        }
    };
    document.getElementById('rotateSlider').oninput = function() { document.getElementById('rotVal').innerText = this.value + "°"; };

    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 180, color: currentColor });
    colorPicker.on('color:change', (c) => { currentColor = c.hexString; document.getElementById('colorBtn').style.backgroundColor = currentColor; updatePreRender(); });
    document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    function closePicker() { document.getElementById('pickerContainer').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function smartUndo() { if(selectedLayer) { textLayers = textLayers.filter(l => l !== selectedLayer); selectedLayer = null; } else if(records.length>0) records.pop(); draw(); }
    function generateRandomDiamonds() { /* 保持原有逻辑 */ }
    function download() { if(!mainImg.src) return; const link = document.createElement('a'); link.download = 'book.png'; link.href = canvas.toDataURL(); link.click(); }
    init();
</script>
</body>
</html>
