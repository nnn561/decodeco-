<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Diamond Sticker Editor</title>\n    <style>\n        #canvas {\n            border: 1px solid #000;\n            margin-top: 10px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Diamond Sticker Editor</h1>\n    <input type=\"file\" id=\"imageUpload\" accept=\"image/*\">\n    <canvas id=\"canvas\" width=\"500\" height=\"500\"></canvas>\n    <div>\n        <button id=\"sticker1\">Sticker 1</button>\n        <button id=\"sticker2\">Sticker 2</button>\n        <button id=\"sticker3\">Sticker 3</button>\n        <button id=\"undo\">Undo</button>\n        <button id=\"download\">Download</button>\n    </div>\n    <script>\n        const canvas = document.getElementById('canvas');\n        const ctx = canvas.getContext('2d');\n        let image = new Image();\n        let stickers = [];\n        let lastSticker = null;\n\n        document.getElementById('imageUpload').addEventListener('change', (event) => {\n            const file = event.target.files[0];\n            const reader = new FileReader();\n            reader.onload = function(e) {\n                image.src = e.target.result;\n                image.onload = function() {\n                    ctx.clearRect(0, 0, canvas.width, canvas.height);\n                    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);\n                }\n            };\n            reader.readAsDataURL(file);\n        });\n\n        const addSticker = (sticker) => {\n            const stickerImg = new Image();\n            stickerImg.src = sticker;\n            stickers.push({ img: stickerImg, x: 0, y: 0 });\n            stickerImg.onload = () => {\n                ctx.drawImage(stickerImg, 0, 0);\n                lastSticker = stickerImg;\n            };\n        };\n\n        document.getElementById('sticker1').addEventListener('click', () => addSticker('sticker1.png'));\n        document.getElementById('sticker2').addEventListener('click', () => addSticker('sticker2.png'));\n        document.getElementById('sticker3').addEventListener('click', () => addSticker('sticker3.png'));\n\n        document.getElementById('undo').addEventListener('click', () => {\n            if (lastSticker) {\n                stickers.pop();\n                ctx.clearRect(0, 0, canvas.width, canvas.height);\n                stickers.forEach(sticker => {\n                    ctx.drawImage(sticker.img, sticker.x, sticker.y);\n                });\n                lastSticker = stickers.length > 0 ? stickers[stickers.length - 1].img : null;\n            }\n        });\n\n        document.getElementById('download').addEventListener('click', () => {\n            const link = document.createElement('a');\n            link.download = 'edited-image.png';\n            link.href = canvas.toDataURL();\n            link.click();\n        });\n    </script>\n</body>\n</html>
