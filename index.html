<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pancake Sticker Book - pancake33</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; --spine-pink: #f8a5bc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 15px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #ffeef4; }
        .title-header { font-size: 24px; color: #fff; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 0px var(--pink-accent); text-align: center; }

        /* 翻页书角样式 */
        .page-fold {
            position: absolute; top: 0; right: 0; width: 50px; height: 50px;
            background: linear-gradient(225deg, transparent 50%, rgba(0,0,0,0.1) 50%, #fff 60%);
            cursor: pointer; z-index: 100; border-radius: 0 40px 0 0;
        }
        .page-fold::after {
            content: '▼'; position: absolute; top: 5px; right: 8px;
            font-size: 12px; color: var(--pink-accent); transform: rotate(-45deg);
        }

        .book-container { width: 94%; max-width: 420px; background: var(--book-cover); padding: 12px; border-radius: 15px 40px 40px 15px; box-shadow: 0 20px 40px rgba(214, 51, 132, 0.2); position: relative; display: flex; flex-direction: column; }
        .top-page, .bottom-page { background: var(--page-white); padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .top-page { border-radius: 12px 25px 0 0; z-index: 2; min-height: 280px; }
        .bottom-page { border-radius: 0 0 25px 12px; min-height: 380px; z-index: 2; }
        
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .sticker-slot { width: 58px; height: 58px; border-radius: 10px; border: 2px solid #f0f0f0; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .sticker-slot.active { border-color: var(--pink-accent); background: #fffafb; transform: scale(1.05); }
        .sticker-item { max-width: 85%; max-height: 85%; object-fit: contain; }

        .input-area { width: 100%; padding: 12px; background: #fffafb; border-radius: 12px; border: 1.5px dashed #ffcad4; margin-bottom: 10px; }
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; outline: none; font-size: 14px; }
        .btn-gen { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; }
        
        /* 上传图片生成样式 */
        .upload-gen-btn { width: 100%; padding: 10px; background: #fff; border: 2px dashed var(--pink-accent); border-radius: 10px; color: var(--pink-accent); font-weight: bold; cursor: pointer; text-align: center; }

        .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; margin-top: 8px; }
        input[type=range] { accent-color: var(--pink-accent); width: 100%; height: 6px; }

        .controls-row { display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 10px; }
        .current-color-dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }

        .canvas-area { flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; position: relative; background: #fffafb; overflow: hidden; margin-top: 10px; touch-action: none; }
        #myCanvas { width: 100%; height: 100%; display: block; }

        .bottom-action-bar { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        .bottom-action-bar button { flex: 1; padding: 12px 2px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 12px; background: var(--pink-accent); }
        
        #pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 200; box-shadow: 0 10px 50px rgba(0,0,0,0.2); width: 280px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 150; }
        .swatch { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 1px solid #eee; }
        .color-swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="page-fold" onclick="togglePage()"></div>
        
        <div id="page1_content">
            <div class="sticker-grid" id="stickerGrid"></div>
            <div class="input-area">
                <div style="font-size:12px; color:var(--pink-accent); font-weight:bold; margin-bottom:5px;">
                    <input type="checkbox" id="useOriginalColor"> 使用Emoji本身颜色
                </div>
                <div class="input-group">
                    <input type="text" id="stickerTextInput" placeholder="输入文字/emoji/颜文字">
                    <button class="btn-gen" onclick="generateSticker('text')">生成</button>
                </div>
            </div>
        </div>

        <div id="page2_content" style="display:none;">
            <div style="text-align:center; padding: 20px 0;">
                <div class="upload-gen-btn" onclick="document.getElementById('stickerImgInput').click()">
                    📁 上传图片生成大贴纸
                </div>
                <input type="file" id="stickerImgInput" accept="image/*" style="display:none">
                <p style="font-size: 11px; color: #999; margin-top: 10px;">上传透明底图片效果更佳</p>
            </div>
        </div>

        <div style="width:100%">
            <div class="slider-label"><span>贴纸缩放</span><span id="textScaleVal">3.0</span></div>
            <input type="range" id="textScaleSlider" min="10" max="400" value="30">
            <div class="slider-label"><span>钻石密度</span><span id="densityVal">中</span></div>
            <input type="range" id="densitySlider" min="4" max="12" value="8" step="2" oninput="updateDensityLabel(this.value)">
        </div>

        <div class="controls-row">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div style="flex:1">
                <div class="slider-label"><span>钻石大小</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="450" value="80">
                <div class="slider-label"><span>钻石角度</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotateSlider" min="0" max="360" value="0">
            </div>
        </div>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone" onclick="if(!mainImg.src)document.getElementById('imgInput').click()">
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button style="background:#ffabbd" onclick="undo()">撤销</button>
            <button style="background:#ffccbb" onclick="randomize()">随机</button>
            <button style="background:#ff6b6b" onclick="clearAll()">清空</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div id="iroPicker"></div>
    <div class="color-swatches" id="historySwatches"></div>
    <div class="color-swatches" id="presetSwatches"></div>
    <button onclick="closePicker()" style="width:100%; background:var(--pink-accent); color:white; border:none; padding:10px; border-radius:10px;">确定</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), ctx = canvas.getContext('2d');
    let mainImg = new Image(), stickers = [], textLayers = [], records = [];
    let curIdx = 0, currentColor = "#FFB7B2", currentPage = 1, selectedLayer = null;
    let isDragging = false, isRotating = false, stickerRatio = 1, colorHistory = [];
    let startX, startY;

    const baseUrl = "https://raw.githubusercontent.com/nnn561/decodeco-/main/";
    const macaronColors = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEEA", "#F3B0C3", "#000000", "#FFFFFF"];

    async function init() {
        for(let i=1; i<=12; i++) {
            const img = new Image(); img.crossOrigin = "anonymous";
            img.src = `${baseUrl}sticker${i}.png`; stickers.push(img);
        }
        renderGrid(); initSwatches();
        window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        draw();
    }

    function togglePage() {
        currentPage = currentPage === 1 ? 2 : 1;
        document.getElementById('page1_content').style.display = currentPage === 1 ? 'block' : 'none';
        document.getElementById('page2_content').style.display = currentPage === 2 ? 'block' : 'none';
    }

    function renderGrid() {
        const grid = document.getElementById('stickerGrid'); grid.innerHTML = '';
        for(let i=0; i<6; i++) {
            const slot = document.createElement('div');
            slot.className = `sticker-slot ${curIdx === i ? 'active' : ''}`;
            const img = document.createElement('img'); img.src = `${baseUrl}sticker${i+1}.png`;
            img.className = 'sticker-item';
            slot.onclick = () => { curIdx = i; document.querySelectorAll('.sticker-slot').forEach(s=>s.classList.remove('active')); slot.classList.add('active'); };
            slot.appendChild(img); grid.appendChild(slot);
        }
    }

    // 贴纸生成逻辑
    function generateSticker(type) {
        if (!mainImg.src) return alert("请先在下方上传背景图");
        const layer = { x: canvas.width/2, y: canvas.height/2, rotation: 0, scale: parseInt(document.getElementById('textScaleSlider').value)/10, dotSize: parseInt(document.getElementById('sizeSlider').value), points: [] };

        if (type === 'text') {
            const text = document.getElementById('stickerTextInput').value; if (!text) return;
            processStickerSource(text, true, layer);
        }
    }

    document.getElementById('stickerImgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => processStickerSource(img, false, { x: canvas.width/2, y: canvas.height/2, rotation: 0, scale: 1, dotSize: 80, points: [] });
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function processStickerSource(src, isText, layer) {
        const tCanvas = document.createElement('canvas'), tCtx = tCanvas.getContext('2d');
        if (isText) {
            tCanvas.width = 300; tCanvas.height = 150;
            tCtx.font = "bold 60px Arial"; tCtx.textAlign = "center"; tCtx.textBaseline = "middle";
            tCtx.fillStyle = "black"; tCtx.fillText(src, 150, 75);
        } else {
            const s = Math.min(200/src.width, 200/src.height);
            tCanvas.width = src.width * s; tCanvas.height = src.height * s;
            tCtx.drawImage(src, 0, 0, tCanvas.width, tCanvas.height);
        }

        const data = tCtx.getImageData(0,0,tCanvas.width,tCanvas.height).data;
        const step = parseInt(document.getElementById('densitySlider').value);
        const useOrig = document.getElementById('useOriginalColor').checked;

        for (let y=0; y<tCanvas.height; y+=step) {
            for (let x=0; x<tCanvas.width; x+=step) {
                const i = (y * tCanvas.width + x) * 4;
                if (data[i+3] > 100) {
                    let color = null;
                    if (useOrig && !isText) color = `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
                    layer.points.push({ dx: x - tCanvas.width/2, dy: y - tCanvas.height/2, color });
                }
            }
        }
        layer.w = tCanvas.width; layer.h = tCanvas.height;
        textLayers.push(layer); selectedLayer = layer; draw();
    }

    function draw(hideUI = false) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);

        // 绘制普通钻石
        records.flat().forEach(r => {
            ctx.save(); ctx.translate(r.x, r.y); ctx.rotate(r.angle);
            ctx.drawImage(r.img, -r.sw/2, -r.sh/2, r.sw, r.sh);
            ctx.restore();
        });

        // 绘制大贴纸
        textLayers.forEach(l => {
            ctx.save();
            ctx.translate(l.x, l.y);
            ctx.rotate(l.rotation);
            
            // 被选中时的视觉反馈（发光+倾斜）
            if (l === selectedLayer && !hideUI) {
                ctx.shadowBlur = 15; ctx.shadowColor = "rgba(255,133,162,0.8)";
                ctx.rotate(0.02); // 轻微倾斜
            }

            const ds = l.dotSize / 6;
            l.points.forEach(p => {
                const px = p.dx * l.scale, py = p.dy * l.scale;
                if (p.color) {
                    ctx.fillStyle = p.color; ctx.fillRect(px-ds/2, py-ds/2, ds, ds);
                } else {
                    ctx.drawImage(stickers[curIdx], px-ds/2, py-ds/2, ds, ds);
                }
            });

            // 绘制UI方框（保存时不显示）
            if (l === selectedLayer && !hideUI) {
                ctx.restore(); ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.rotation);
                ctx.strokeStyle = varColor('--pink-accent'); ctx.lineWidth = 4;
                const bw = (l.w/2)*l.scale + 10, bh = (l.h/2)*l.scale + 10;
                ctx.strokeRect(-bw, -bh, bw*2, bh*2);
                // 旋转点
                ctx.fillStyle = "white"; ctx.beginPath();
                ctx.arc(0, bh + 15, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
            ctx.restore();
        });
    }

    // 交互逻辑
    canvas.addEventListener('touchstart', e => {
        const r = canvas.getBoundingClientRect();
        const tx = e.touches[0].clientX - r.left, ty = e.touches[0].clientY - r.top;
        const x = tx * (canvas.width / r.width), y = ty * (canvas.height / r.height);
        
        let found = null;
        for (let i = textLayers.length-1; i>=0; i--) {
            const l = textLayers[i];
            const bw = (l.w/2)*l.scale + 20, bh = (l.h/2)*l.scale + 20;
            // 判定旋转点
            const rx = l.x + Math.sin(-l.rotation)*(bh+15), ry = l.y + Math.cos(l.rotation)*(bh+15);
            if (Math.hypot(x-rx, y-ry) < 25) { isRotating = true; selectedLayer = l; break; }
            // 判定移动
            if (Math.abs(x-l.x) < bw && Math.abs(y-l.y) < bh) { found = l; break; }
        }

        if (found) { selectedLayer = found; isDragging = true; startX = x - found.x; startY = y - found.y; }
        else if (!isRotating) {
            selectedLayer = null;
            const s = parseInt(document.getElementById('sizeSlider').value);
            records.push([{ x, y, img: stickers[curIdx], sw: s, sh: s, angle: parseInt(document.getElementById('rotateSlider').value)*Math.PI/180 }]);
        }
        draw();
    });

    canvas.addEventListener('touchmove', e => {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches[0].clientX - r.left)*(canvas.width/r.width), y = (e.touches[0].clientY - r.top)*(canvas.height/r.height);
        if (isDragging && selectedLayer) { selectedLayer.x = x - startX; selectedLayer.y = y - startY; }
        if (isRotating && selectedLayer) { selectedLayer.rotation = Math.atan2(x - selectedLayer.x, -(y - selectedLayer.y)) + Math.PI; }
        if (isDragging || isRotating) draw();
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', () => { isDragging = isRotating = false; draw(); });

    // 调色与保存
    const colorPicker = new iro.ColorPicker("#iroPicker", { width: 220, color: currentColor });
    colorPicker.on('color:change', c => { 
        currentColor = c.hexString; document.getElementById('colorBtn').style.backgroundColor = currentColor; 
        document.getElementById('colorBtn').innerText = ""; 
    });

    function download() {
        selectedLayer = null; draw(true);
        const link = document.createElement('a');
        const now = new Date();
        link.download = `pancake_${now.getTime()}.png`;
        link.href = canvas.toDataURL(); link.click();
        draw();
    }

    function randomize() {
        let g = []; const s = parseInt(document.getElementById('sizeSlider').value);
        for(let i=0; i<15; i++) {
            g.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
                     img: stickers[Math.floor(Math.random()*stickers.length)], 
                     sw: s*(0.5+Math.random()), sh: s*(0.5+Math.random()), angle: Math.random()*Math.PI*2 });
        }
        records.push(g); draw();
    }

    function undo() { if(selectedLayer) { textLayers = textLayers.filter(l=>l!==selectedLayer); selectedLayer=null; } else records.pop(); draw(); }
    function clearAll() { if(confirm("清空？")) { textLayers=[]; records=[]; draw(); } }
    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function updateDensityLabel(v) { document.getElementById('densityVal').innerText = v<6?"极多":v<8?"多":v<10?"中":"少"; }
    function closePicker() { document.getElementById('pickerContainer').style.display='none'; document.getElementById('overlay').style.display='none'; }
    document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display='block'; document.getElementById('overlay').style.display='block'; };
    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { mainImg = new Image(); mainImg.onload = resizeCanvas; mainImg.src = f.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };
    function initSwatches() {
        const p = document.getElementById('presetSwatches');
        macaronColors.forEach(c => {
            const s = document.createElement('div'); s.className = 'swatch'; s.style.backgroundColor = c;
            s.onclick = () => colorPicker.color.set(c); p.appendChild(s);
        });
    }

    init();
</script>
</body>
</html>
