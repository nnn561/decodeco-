<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Pancake Sticker Book - pancake33</title>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    <style>
        :root { --book-cover: #fabecc; --page-white: #ffffff; --pink-accent: #ff85a2; --ring-gray: #7d7d7d; --spine-pink: #f8a5bc; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 15px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background-color: #ffeef4; }
.title-header { font-size: 24px; color: #fff; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 0px var(--pink-accent); text-align: center; }

.book-container { width: 94%; max-width: 420px; background: var(--book-cover); padding: 12px; border-radius: 15px 40px 40px 15px; box-shadow: 0 20px 40px rgba(214, 51, 132, 0.2); position: relative; display: flex; flex-direction: column; margin: 0 auto; }
.top-page, .bottom-page { background: var(--page-white); padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; box-shadow: inset 1px 1px 10px rgba(0,0,0,0.03); }
.top-page { border-radius: 12px 25px 0 0; z-index: 2; min-height: 300px; }
.bottom-page { border-radius: 0 0 25px 12px; min-height: 380px; z-index: 2; }
.spine-area { height: 30px; background: var(--spine-pink); width: 100%; position: relative; z-index: 5; margin: -5px 0; display: flex; justify-content: space-around; align-items: center; }
.ring { width: 10px; height: 45px; background: var(--ring-gray); border-radius: 5px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3); }

/* 翻頁書角 */
.page-corner {
    position: absolute; top: 0; right: 0; width: 45px; height: 45px; 
    background: linear-gradient(135deg, transparent 50%, #f8a5bc 50%);
    cursor: pointer; z-index: 30; border-radius: 0 25px 0 0;
    display: flex; align-items: flex-end; justify-content: flex-end; padding: 5px;
}
.page-corner::after { content: '▼'; color: white; font-size: 12px; }

.page-content { width: 100%; display: none; }
.page-content.active { display: block; }

.sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 10px; justify-items: center; }
.sticker-slot { width: 58px; height: 58px; border-radius: 10px; border: 2px solid #f0f0f0; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
.sticker-slot.active { border-color: var(--pink-accent); background: #fffafb; }
.sticker-item { max-width: 85%; max-height: 85%; object-fit: contain; }

.page-ctrl { display: flex; gap: 15px; margin-bottom: 15px; width: 100%; justify-content: center; }
.page-ctrl button { background: #fff; color: var(--pink-accent); border: 1px solid #ffcad4; border-radius: 6px; padding: 3px 12px; font-size: 11px; font-weight: bold; cursor: pointer; }
.page-ctrl button.active { background: var(--pink-accent); color: white; }

.text-to-sticker-area { width: 100%; padding: 10px; background: #fffafb; border-radius: 12px; border: 1px dashed #ffcad4; margin-bottom: 10px; }
.text-input-group { display: flex; gap: 5px; margin-bottom: 8px; }
.text-input-group input { flex: 1; border: 1.5px solid #ffcad4; border-radius: 8px; padding: 8px; outline: none; font-size: 14px; }
.text-input-group button { background: var(--pink-accent); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; }

.slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--pink-accent); font-weight: bold; margin-top: 5px; }
input[type=range] { accent-color: var(--pink-accent); width: 100%; cursor: pointer; }

.controls { display: flex; align-items: center; gap: 12px; width: 100%; }
.current-color-dot { width: 48px; height: 48px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; flex-shrink: 0; }

.canvas-area { flex: 1; width: 100%; border: 2px dashed #ffcad4; border-radius: 15px; position: relative; background: #fffafb; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 10px; }
#myCanvas { max-width: 100%; max-height: 100%; touch-action: none; z-index: 6; }
.plus-icon { font-size: 60px; color: #ffabbd; position: absolute; pointer-events: none; z-index: 1; }

.bottom-action-bar { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
.bottom-action-bar button { flex: 1; padding: 12px 2px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; background: var(--pink-accent); box-shadow: 0 3px 0 #e66a85; }

#pickerContainer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 101; box-shadow: 0 10px 50px rgba(0,0,0,0.2); width: 280px; }
.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="title-header">pancake sticker book</div>

<div class="book-container">
    <div class="top-page">
        <div class="page-corner" onclick="toggleBookPage()"></div>

        <div id="pageContent1" class="page-content active">
            <div class="sticker-grid" id="stickerGrid"></div>
            <div class="page-ctrl">
                <button id="pageBtn1" class="active" onclick="renderStickers(1); switchPageTab(1)">第一頁</button>
                <button id="pageBtn2" onclick="renderStickers(2); switchPageTab(1)">下一頁</button>
            </div>
            
            <div class="text-to-sticker-area">
                <div style="display:flex; align-items:center; gap:5px; margin-bottom:5px; font-size:12px; color:var(--pink-accent); font-weight:bold;">
                    <input type="checkbox" id="useOriginalColor"> <label for="useOriginalColor">使用Emoji本身顏色</label>
                </div>
                <div class="text-input-group">
                    <input type="text" id="stickerTextInput" placeholder="輸入文字/emoji/顏文字">
                    <button onclick="generateTextStickers()">生成</button>
                </div>
                <div class="slider-label"><span>貼紙大小</span><span id="textScaleVal">3.0</span></div>
                <input type="range" id="textScaleSlider" min="10" max="300" value="30">
            </div>
        </div>

        <div id="pageContent2" class="page-content">
            <div class="text-to-sticker-area" style="text-align: center; min-height: 180px; display: flex; flex-direction: column; justify-content: center;">
                <p style="font-size:14px; color:var(--pink-accent); font-weight:bold;">✨ 圖片水鑽工坊 ✨</p>
                <button onclick="document.getElementById('rhinstoneInput').click()" style="background:var(--pink-accent); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; margin-top:10px;">選擇圖片導入</button>
                <input type="file" id="rhinstoneInput" accept="image/*" style="display:none;" onchange="handleRhinstoneUpload(event)">
                <p style="font-size:11px; color:#999; margin-top:10px;">上傳圖片後將生成可移動的水鑽貼紙</p>
            </div>
        </div>

        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div style="flex:1">
                <div class="slider-label"><span>鑽石大小</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="400" value="80">
                <div class="slider-label"><span>鑽石角度</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotateSlider" min="0" max="360" value="0">
            </div>
        </div>
    </div>

    <div class="spine-area">
        <script>for(let i=0; i<6; i++) document.write('<div class="ring"></div>');</script>
    </div>

    <div class="bottom-page">
        <div class="canvas-area" id="dropZone" onclick="if(!mainImg.src)imgInput.click()">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button style="background:#ffabbd" onclick="smartUndo()">撤銷</button>
            <button style="background:#ffccbb" onclick="generateRandomDiamonds()">隨機</button>
            <button style="background:#ff6b6b" onclick="clearAll()">清空</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>
        <div class="text-to-sticker-area">
            <div style="display:flex; align-items:center; gap:5px; margin-bottom:5px; font-size:12px; color:var(--pink-accent); font-weight:bold;">
                <input type="checkbox" id="useOriginalColor"> <label for="useOriginalColor">使用Emoji本身颜色</label>
            </div>
            <div class="text-input-group">
                <input type="text" id="stickerTextInput" placeholder="输入文字/emoji/颜文字">
                <button onclick="generateTextStickers()">生成</button>
            </div>
            <div class="slider-label"><span>贴纸大小</span><span id="textScaleVal">3.0</span></div>
            <input type="range" id="textScaleSlider" min="10" max="300" value="30">
            <div class="slider-label"><span>钻石密度</span><span id="densityVal">少</span></div>
            <input type="range" id="densitySlider" min="6" max="12" value="6" step="2" oninput="updateDensityLabel(this.value)">
        </div>
        <div class="controls">
            <div class="current-color-dot" id="colorBtn" style="background: #FFB7B2;"></div>
            <div style="flex:1">
                <div class="slider-label"><span>钻石大小 (联动贴纸中钻石大小)</span><span id="sizeVal">80</span></div>
                <input type="range" id="sizeSlider" min="30" max="300" value="80">
                <div class="slider-label"><span>钻石角度</span><span id="rotVal">0°</span></div>
                <input type="range" id="rotateSlider" min="0" max="360" value="0">
            </div>
        </div>
    </div>
    <div class="spine-area">
        <script>for(let i=0; i<6; i++) document.write('<div class="ring"></div>');</script>
    </div>
    <div class="bottom-page">
        <div class="canvas-area" id="dropZone" onclick="if(!mainImg.src)imgInput.click()">
            <div class="plus-icon">+</div>
            <canvas id="myCanvas"></canvas>
        </div>
        <div class="bottom-action-bar">
            <button style="background:#ffabbd" onclick="smartUndo()">撤销</button>
            <button style="background:#ffccbb" onclick="generateRandomDiamonds()">随机</button>
            <button style="background:#ff6b6b" onclick="clearAll()">清空</button>
            <button onclick="download()">保存</button>
        </div>
        <input type="file" id="imgInput" accept="image/*" style="display: none;">
    </div>
</div>

<div id="pickerContainer">
    <div class="color-preview-bar" id="colorPreview" style="background:#FFB7B2">#FFB7B2</div>
    <div id="iroPicker"></div>
    <div class="swatch-title">历史颜色</div>
    <div class="color-swatches" id="historySwatches"></div>
    <div class="swatch-title">初始颜色</div>
    <div class="color-swatches" id="presetSwatches"></div>
    <button onclick="closePicker()" style="margin-top:12px; background:var(--pink-accent); width:100%; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold;">确定</button>
</div>

<script>
    const canvas = document.getElementById('myCanvas'), mainCtx = canvas.getContext('2d');
const imgInput = document.getElementById('imgInput');
let mainImg = new Image(), stickers = [], records = [], textLayers = [];
let curIdx = 0, currentColor = "#FFB7B2", preRenderedSticker = null, selectedLayer = null;
let isDragging = false, isRotating = false, stickerRatio = 1, colorHistory = [];

const baseUrl = "https://raw.githubusercontent.com/nnn561/decodeco-/main/";
const macaronColors = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEEA", "#F3B0C3", "#000000", "#FFFFFF"];

// --- 翻页功能 ---
function switchPageTab(page) {
    document.getElementById('pageContent1').classList.toggle('active', page === 1);
    document.getElementById('pageContent2').classList.toggle('active', page === 2);
    document.getElementById('pageBtn1').className = (page === 1 ? 'active' : '');
    document.getElementById('pageBtn2').className = (page === 2 ? 'active' : '');
}
function toggleBookPage() {
    const isP1 = document.getElementById('pageContent1').classList.contains('active');
    switchPageTab(isP1 ? 2 : 1);
}

// --- 图片上传生成大贴纸 ---
function handleRhinstoneUpload(event) {
    const file = event.target.files[0];
    if (!file || !mainImg.src) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const userImg = new Image();
        userImg.onload = () => {
            const newLayer = { type: 'image', img: userImg, x: canvas.width/2, y: canvas.height/2, scale: 0.3, angle: 0 };
            textLayers.push(newLayer); selectedLayer = newLayer; draw();
        };
        userImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// --- 核心绘制函数 (包含隐藏方框逻辑) ---
function draw(isFast = false, hideFrame = false) {
    mainCtx.clearRect(0,0,canvas.width,canvas.height);
    if(mainImg.src) mainCtx.drawImage(mainImg, 0, 0, canvas.width, canvas.height);
    
    records.flat().forEach(r => {
        mainCtx.save(); mainCtx.translate(r.x, r.y); mainCtx.rotate(r.angle || 0);
        if(r.glow) { mainCtx.shadowBlur = 20; mainCtx.shadowColor = "white"; mainCtx.filter = "brightness(1.2)"; }
        mainCtx.drawImage(r.img, -r.sizeW/2, -r.sizeH/2, r.sizeW, r.sizeH);
        mainCtx.restore();
    });

    textLayers.forEach(l => {
        mainCtx.save(); mainCtx.translate(l.x, l.y); mainCtx.rotate(l.angle || 0);
        const dw = (l.type === 'image' ? l.img.width : (l.origWidth||100)) * l.scale;
        const dh = (l.type === 'image' ? l.img.height : 60) * l.scale;
        
        if(l.type === 'image') {
            mainCtx.drawImage(l.img, -dw/2, -dh/2, dw, dh);
        } else {
            const dotS = l.dotSize/6;
            const pw = dotS*(l.ratio>=1?1:l.ratio), ph = dotS/(l.ratio>=1?l.ratio:1);
            l.points.forEach(p => { if(l.img) mainCtx.drawImage(l.img, p.dx*l.scale-pw/2, p.dy*l.scale-ph/2, pw, ph); });
        }

        if(l === selectedLayer && !hideFrame) {
            mainCtx.strokeStyle = "#ff85a2"; mainCtx.lineWidth = 4;
            mainCtx.strokeRect(-dw/2-10, -dh/2-10, dw+20, dh+20);
            // 旋转圆点
            mainCtx.fillStyle = "#ff85a2"; mainCtx.beginPath();
            mainCtx.arc(0, dh/2 + 30, 12, 0, Math.PI*2); mainCtx.fill();
            mainCtx.strokeStyle = "white"; mainCtx.stroke();
        }
        mainCtx.restore();
    });
}

// --- 交互：双击、拖动、旋转 ---
canvas.addEventListener('touchstart', (e) => {
    const p = getPos(e); if(!mainImg.src) return;
    if(selectedLayer) {
        const dh = (selectedLayer.type === 'image' ? selectedLayer.img.height : 60) * selectedLayer.scale;
        const rx = selectedLayer.x + Math.sin(-selectedLayer.angle)*(dh/2+30);
        const ry = selectedLayer.y + Math.cos(-selectedLayer.angle)*(dh/2+30);
        if(Math.hypot(p.x-rx, p.y-ry) < 30) { isRotating = true; return; }
    }
    let found = textLayers.find(l => Math.hypot(p.x-l.x, p.y-l.y) < 60);
    if(found) { selectedLayer = found; isDragging = true; } 
    else { 
        selectedLayer = null; const s = parseInt(document.getElementById('sizeSlider').value);
        records.push([{ x:p.x, y:p.y, img:preRenderedSticker, sizeW: s*(stickerRatio>=1?1:stickerRatio), sizeH: s/(stickerRatio>=1?stickerRatio:1), angle:parseInt(document.getElementById('rotateSlider').value)*Math.PI/180 }]); 
    }
    draw();
});

canvas.addEventListener('touchmove', (e) => {
    const p = getPos(e);
    if(isRotating && selectedLayer) { selectedLayer.angle = Math.atan2(p.y-selectedLayer.y, p.x-selectedLayer.x) - Math.PI/2; draw(true); }
    else if(isDragging && selectedLayer) { selectedLayer.x = p.x; selectedLayer.y = p.y; draw(true); }
    e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchend', () => { isDragging = false; isRotating = false; draw(); });

// 双击生成发光随机钻石
canvas.addEventListener('dblclick', (e) => {
    const p = getPos(e); const s = 120 + Math.random()*80;
    records.push([{ x:p.x, y:p.y, img:preRenderedSticker, sizeW:s, sizeH:s, angle:Math.random()*Math.PI, glow:true }]);
    draw();
});

// --- 保存 (隐藏方框) ---
function download() {
    draw(false, true);
    setTimeout(() => {
        const link = document.createElement('a');
        link.download = `pancake_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
        draw();
    }, 100);
}

// --- 以下是基础初始化函数 (保持原有逻辑) ---
const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
};

async function init() {
    for(let i=1; i<=12; i++) {
        const img = new Image(); img.crossOrigin = "anonymous";
        img.src = `${baseUrl}sticker${i}.png`; stickers.push(img);
        if(i===1) img.onload = () => updatePreRender();
    }
    renderStickers(1);
}

function updatePreRender() {
    const sImg = stickers[curIdx]; if(!sImg.complete) return;
    stickerRatio = sImg.naturalWidth / sImg.naturalHeight;
    const oc = document.createElement('canvas'), ox = oc.getContext('2d');
    oc.width = 150; oc.height = 150/stickerRatio;
    ox.drawImage(sImg, 0, 0, oc.width, oc.height);
    ox.globalCompositeOperation="multiply"; ox.fillStyle=currentColor; ox.fillRect(0,0,oc.width,oc.height);
    ox.globalCompositeOperation="destination-in"; ox.drawImage(sImg, 0, 0, oc.width, oc.height);
    preRenderedSticker = new Image(); preRenderedSticker.src = oc.toDataURL();
    if(selectedLayer) { selectedLayer.img = preRenderedSticker; draw(); }
}

function renderStickers(page) {
    const grid = document.getElementById('stickerGrid'); grid.innerHTML = '';
    const start = page === 1 ? 1 : 7;
    for(let i=start; i<start+6; i++) {
        const slot = document.createElement('div'); slot.className = 'sticker-slot' + (curIdx === i-1 ? ' active' : '');
        const imgEl = document.createElement('img'); imgEl.src = `${baseUrl}sticker${i}.png`; imgEl.className = 'sticker-item';
        slot.onclick = () => { curIdx = i-1; updatePreRender(); renderStickers(page); };
        slot.appendChild(imgEl); grid.appendChild(slot);
    }
}

function generateTextStickers() {
    if (!mainImg.src) return imgInput.click();
    const text = document.getElementById('stickerTextInput').value; if (!text) return;
    const useOriginal = document.getElementById('useOriginalColor').checked;
    const fSize = 60, tempCanvas = document.createElement('canvas'), tempCtx = tempCanvas.getContext('2d');
    tempCtx.font = `bold ${fSize}px Arial`; const tw = tempCtx.measureText(text).width + 80;
    tempCanvas.width = tw; tempCanvas.height = fSize * 2.5;
    tempCtx.font = `bold ${fSize}px Arial`; tempCtx.textBaseline = 'middle'; tempCtx.textAlign = 'center';
    tempCtx.fillStyle = 'black'; tempCtx.fillText(text, tempCanvas.width/2, tempCanvas.height/2);
    const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data, points = [];
    for (let y = 0; y < tempCanvas.height; y += 4) {
        for (let x = 0; x < tempCanvas.width; x += 4) {
            const idx = (y * tempCanvas.width + x) * 4;
            if (imgData[idx + 3] > 120) points.push({ dx: x - tempCanvas.width/2, dy: y - tempCanvas.height/2 });
        }
    }
    const newLayer = { points, x: canvas.width/2, y: canvas.height/2, scale: parseInt(document.getElementById('textScaleSlider').value)/10, img: preRenderedSticker, ratio: stickerRatio, origWidth: tw, dotSize: parseInt(document.getElementById('sizeSlider').value) };
    textLayers.push(newLayer); selectedLayer = newLayer; draw();
}

function smartUndo() { if(selectedLayer){ textLayers=textLayers.filter(l=>l!==selectedLayer); selectedLayer=null; } else records.pop(); draw(); }
function clearAll() { if(confirm("清空吗？")){ textLayers=[]; records=[]; draw(); } }

imgInput.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (f) => { mainImg = new Image(); mainImg.onload = () => { canvas.width = mainImg.width; canvas.height = mainImg.height; draw(); }; mainImg.src = f.target.result; };
    reader.readAsDataURL(e.target.files[0]);
};

// 拾色器控制
document.getElementById('colorBtn').onclick = () => { document.getElementById('pickerContainer').style.display='block'; document.getElementById('overlay').style.display='block'; };
window.closePicker = () => { document.getElementById('pickerContainer').style.display='none'; document.getElementById('overlay').style.display='none'; };

init();

</script>
</body>
</html>
