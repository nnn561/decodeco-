<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>变色钻石 DIY 进阶版</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* 贴纸选择区域：自动换行 */
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; background: #333; padding: 10px; border-radius: 12px; }
        .sticker-item { width: 100%; aspect-ratio: 1; border: 3px solid transparent; border-radius: 8px; cursor: pointer; transition: 0.2s; object-fit: contain; }
        .sticker-item.active { border-color: #007bff; background: #444; }

        .controls { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 10px 0; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 14px; color: #555; }
        
        #myCanvas { border: 1px solid #ddd; border-radius: 10px; max-width: 100%; height: auto; display: block; margin: 10px auto; background: #fff; cursor: crosshair; }
        
        input[type="range"] { width: 65%; }
        input[type="color"] { width: 50px; height: 30px; border: none; padding: 0; background: none; cursor: pointer; }
        
        .footer-btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-undo { background: #ff4d4f; }
        .btn-save { background: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <div style="padding:10px; border-bottom:1px solid #eee;">
        <input type="file" id="imgInput" accept="image/*" style="font-size: 14px;">
    </div>

    <div class="sticker-grid" id="stickerGrid">
        </div>

    <div class="controls">
        <div class="control-row">
            <span>💎 钻石颜色:</span>
            <input type="color" id="colorPicker" value="#00E5FF">
            <span id="colorHex" style="font-family: monospace; font-size: 12px;">#00E5FF</span>
        </div>
        <div class="control-row">
            <span>📏 钻石大小:</span>
            <input type="range" id="sizeSlider" min="10" max="300" value="70">
            <span id="sizeVal">70</span>
        </div>
    </div>

    <canvas id="myCanvas"></canvas>
    
    <div class="footer-btns">
        <button class="btn-undo" onclick="undo()">撤销上一步</button>
        <button class="btn-save" onclick="download()">保存到手机</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const stickerGrid = document.getElementById('stickerGrid');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;

    // --- 初始化 6 张贴纸 ---
    for(let i=1; i<=6; i++) {
        const img = new Image();
        img.src = `sticker${i}.png`; // 确保你的文件名是 sticker1.png 到 sticker6.png
        stickers.push(img);

        // 创建选择按钮
        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
        imgEl.onclick = function() {
            curIdx = i - 1;
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
        };
        stickerGrid.appendChild(imgEl);
    }

    // --- 上传背景逻辑 ---
    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 点击画布贴钻 ---
    canvas.addEventListener('mousedown', (e) => handleInput(e));
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput(e.touches[0]);
    }, {passive: false});

    function handleInput(e) {
        if(!mainImg.src) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        records.push({
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY,
            idx: curIdx,
            color: document.getElementById('colorPicker').value,
            size: parseInt(document.getElementById('sizeSlider').value)
        });
        draw();
    }
        // --- 核心繪製與變色邏輯（亮晶晶增強版） ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if(!sImg.complete) return;

            // 創建一個臨時的離屏畫布來處理染色
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = r.size;
            offCanvas.height = r.size;

            // 步驟 1：先畫出原始的白色鑽石（保留高光細節）
            offCtx.drawImage(sImg, 0, 0, r.size, r.size);

            // 步驟 2：使用 'multiply' (正片疊底) 模式染上顏色
            // 這種模式下，白色會變成你選的顏色，而黑色/陰影會變得更深，效果最真實
            offCtx.globalCompositeOperation = "multiply";
            offCtx.fillStyle = r.color;
            offCtx.fillRect(0, 0, r.size, r.size);

            // 步驟 3：使用 'destination-in' 模式，把多餘的顏色切掉，只留下鑽石形狀
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(sImg, 0, 0, r.size, r.size);
            
            // 步驟 4：最後將這顆染好色、亮晶晶的鑽石畫到主畫布上
            ctx.drawImage(offCanvas, r.x - r.size/2, r.y - r.size/2);
        });
    }
    // --- 辅助功能 ---
    function undo() { records.pop(); draw(); }
    
    function download() {
        if(!mainImg.src) return;
        const link = document.createElement('a');
        link.download = 'my_diamond_work.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // 实时更新数值显示
    document.getElementById('sizeSlider').oninput = function() {
        document.getElementById('sizeVal').innerText = this.value;
    };
    document.getElementById('colorPicker').oninput = function() {
        document.getElementById('colorHex').innerText = this.value.toUpperCase();
    };

</script>
</body>
</html>
