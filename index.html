<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pancake sticker book</title>
    <style>
        :root { --accent-pink: #ff85a2; --text-color: #d63384; }
        body { 
            font-family: -apple-system, sans-serif; text-align: center; 
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffdef3, #f7bbff);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            margin: 0; padding: 10px; min-height: 100vh; overflow: hidden; 
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .container { 
            max-width: 550px; margin: auto; background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(10px); padding: 15px; border-radius: 25px; 
            display: flex; flex-direction: column; height: 92vh;
        }

        .sticker-grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 8px; margin: 10px 0; background: rgba(255, 255, 255, 0.4); 
            padding: 10px; border-radius: 15px; 
        }
        .sticker-item { width: 100%; aspect-ratio: 1; border: 2px solid transparent; border-radius: 8px; cursor: pointer; object-fit: contain; background: #fff; }
        .sticker-item.active { border-color: var(--accent-pink); transform: scale(1.1); box-shadow: 0 0 10px var(--accent-pink); }

        /* 画布交互区域 */
        .viewport { 
            flex: 1; position: relative; overflow: hidden; 
            background: #fff; border-radius: 15px; border: 2px solid #fff; margin: 10px 0;
            touch-action: none;
        }
        #myCanvas { position: absolute; transform-origin: 0 0; }

        .controls { background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .control-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: var(--text-color); font-weight: bold; }
        
        .palette-button { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        #colorPicker { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; }

        input[type="range"] { width: 50%; accent-color: var(--accent-pink); }
        .footer-btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-undo { background: #ff7875; }
        .btn-save { background: var(--accent-pink); }
    </style>
</head>
<body>

<div class="container">
    <input type="file" id="imgInput" accept="image/*" style="font-size: 12px; margin-bottom: 5px;">

    <div class="sticker-grid" id="stickerGrid"></div>

    <div class="controls">
        <div class="control-row">
            <span>🎨 调色盘:</span>
            <div class="palette-button" id="paletteBtn"><input type="color" id="colorPicker" value="#00E5FF"></div>
            <span>📏 钻石大小:</span>
            <input type="range" id="sizeSlider" min="10" max="500" value="70">
            <span id="sizeVal">70</span>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <canvas id="myCanvas"></canvas>
    </div>
    
    <div class="footer-btns">
        <button class="btn-undo" onclick="undo()">撤销上一步</button>
        <button class="btn-save" onclick="download()">保存到手机</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');
    
    let mainImg = new Image();
    let stickers = [];
    let records = [];
    let curIdx = 0;

    // 变换参数
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    
    // 交互辅助
    let lastPinchDist = 0;
    let lastPinchCenter = { x: 0, y: 0 };

    // --- 初始化 6 张贴纸 ---
    for(let i=1; i<=6; i++) {
        const img = new Image();
        img.src = `sticker${i}.png`; 
        stickers.push(img);
        const imgEl = document.createElement('img');
        imgEl.src = img.src;
        imgEl.className = 'sticker-item' + (i===1 ? ' active' : '');
        imgEl.onclick = () => {
            curIdx = i - 1;
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('active'));
            imgEl.classList.add('active');
        };
        document.getElementById('stickerGrid').appendChild(imgEl);
    }

    // --- 上传并居中 ---
    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            mainImg = new Image();
            mainImg.onload = () => {
                canvas.width = mainImg.width;
                canvas.height = mainImg.height;
                
                // 自动居中计算
                const vW = viewport.clientWidth;
                const vH = viewport.clientHeight;
                scale = Math.min(vW / canvas.width, vH / canvas.height) * 0.9;
                offsetX = (vW - canvas.width * scale) / 2;
                offsetY = (vH - canvas.height * scale) / 2;
                
                updateTransform();
                draw();
            };
            mainImg.src = f.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- 触控交互逻辑 ---
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            // 双指开始：记录初始距离和中心点
            lastPinchDist = getDistance(e.touches);
            lastPinchCenter = getCenter(e.touches);
        }
    }, {passive: false});

    viewport.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) {
            // 双指移动：同时处理缩放和位移
            const currentDist = getDistance(e.touches);
            const currentCenter = getCenter(e.touches);
            
            // 缩放
            const zoomFactor = currentDist / lastPinchDist;
            const newScale = scale * zoomFactor;
            
            // 计算以中心点缩放带来的偏移
            const rect = viewport.getBoundingClientRect();
            const centerX = currentCenter.x - rect.left;
            const centerY = currentCenter.y - rect.top;

            offsetX = centerX - (centerX - offsetX) * (newScale / scale);
            offsetY = centerY - (centerY - offsetY) * (newScale / scale);
            
            // 位移（同步跟随中心点移动）
            offsetX += (currentCenter.x - lastPinchCenter.x);
            offsetY += (currentCenter.y - lastPinchCenter.y);

            scale = newScale;
            lastPinchDist = currentDist;
            lastPinchCenter = currentCenter;
            
            updateTransform();
        }
    }, {passive: false});

    viewport.addEventListener('touchend', (e) => {
        // 如果是单指抬起，且之前没有双指操作，则判定为贴钻
        if (e.touches.length === 0 && e.changedTouches.length === 1) {
            // 简单判定：没有发生双指缩放时才贴
            addSticker(e.changedTouches[0]);
        }
    });

    function updateTransform() {
        canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function addSticker(touch) {
        if(!mainImg.src) return;
        const rect = viewport.getBoundingClientRect();
        // 精准计算原始像素坐标
        const x = (touch.clientX - rect.left - offsetX) / scale;
        const y = (touch.clientY - rect.top - offsetY) / scale;

        records.push({
            x: x, y: y,
            idx: curIdx,
            color: document.getElementById('colorPicker').value,
            size: parseInt(document.getElementById('sizeSlider').value)
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(mainImg.src) ctx.drawImage(mainImg, 0, 0);
        records.forEach(r => {
            const sImg = stickers[r.idx];
            if(!sImg.complete) return;
            const ratio = sImg.width / sImg.height;
            let drawW = ratio > 1 ? r.size : r.size * ratio;
            let drawH = ratio > 1 ? r.size / ratio : r.size;

            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = drawW; offCanvas.height = drawH;
            
            offCtx.drawImage(sImg, 0, 0, drawW, drawH);
            offCtx.globalCompositeOperation = "multiply";
            offCtx.fillStyle = r.color;
            offCtx.fillRect(0, 0, drawW, drawH);
            offCtx.globalCompositeOperation = "destination-in";
            offCtx.drawImage(sImg, 0, 0, drawW, drawH);
            
            ctx.drawImage(offCanvas, r.x - drawW/2, r.y - drawH/2);
        });
    }

    // 工具函数
    function getDistance(touches) {
        return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
    }
    function getCenter(touches) {
        return { x: (touches[0].clientX + touches[1].clientX) / 2, y: (touches[0].clientY + touches[1].clientY) / 2 };
    }
    function undo() { records.pop(); draw(); }
    function download() {
        if(!mainImg.src) return;
        const link = document.createElement('a');
        link.download = `pancake_art_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
    document.getElementById('sizeSlider').oninput = function() { document.getElementById('sizeVal').innerText = this.value; };
    document.getElementById('colorPicker').oninput = function() { document.getElementById('paletteBtn').style.backgroundColor = this.value; };
</script>
</body>
</html>
